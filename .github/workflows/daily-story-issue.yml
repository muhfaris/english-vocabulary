name: Daily Story Issue

on:
  schedule:
    - cron: '30 14 * * *' # Runs every day at 14:30 UTC (9:30 PM WIB)
  workflow_dispatch: # Allows manual triggering

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          BODY_CONTENT=$(cat .github/daily_story_prompt.md)
          JSON_PAYLOAD=$(jq -n \
            --arg title "Generate Story Today $(date +'%Y-%m-%d')" \
            --arg body "$BODY_CONTENT" \
            '{title: $title, body: $body, labels: ["jules"]}')
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "$JSON_PAYLOAD"

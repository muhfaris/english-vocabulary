- word: Ad-hoc
  pronunciation: /ˌæd ˈhɒk/
  part_of_speech: adjective
  meaning:
    english: Done for a particular purpose as necessary, without planning or organization.
      Something that is improvised or 'on the spot'.
    bahasa: Dilakukan untuk tujuan tertentu seperlunya, tanpa perencanaan atau organisasi.
      Sesuatu yang diimprovisasi atau 'di tempat'.
  usage: Use 'ad-hoc' to describe tasks, queries, or meetings that are not part of
    a regular schedule but are done to solve a specific, immediate need.
  synonyms:
  - improvised
  - unplanned
  examples:
    workplace:
    - The CEO needed a specific number, so I had to write an ad-hoc database query
      to get it for him.
    - We don't have a formal process for this; we just handle requests on an ad-hoc
      basis.
    casual:
    - We formed an ad-hoc committee to plan the neighborhood party.
    - It wasn't a planned trip, it was an ad-hoc decision to go to the beach.
  related:
  - word: On the fly
    difference: Very similar. 'Ad-hoc' often describes the *nature* of the task (e.g.,
      'an ad-hoc query'), while 'on the fly' often describes *how* you do it (e.g.,
      'I wrote the query on the fly').
  - word: Scheduled
    difference: '''Scheduled'' tasks are planned in advance. ''Ad-hoc'' tasks are
      not.'
  story: 'Usually, we have a dashboard for tracking sales. But this morning, the sales
    manager had a very specific question: "How many users in Germany bought a blue
    shirt last Tuesday?" This data wasn''t on our regular dashboard. I had to go into
    the database and write an ad-hoc query specifically to answer that one question.
    It was a one-time, ad-hoc task to solve an immediate need.

    '
- word: Alignment
  pronunciation: /əˈlaɪn.mənt/
  part_of_speech: noun
  meaning:
    english: A state of agreement or cooperation among persons, groups, or nations
      with a common goal or viewpoint.
    bahasa: Keadaan kesepakatan atau kerjasama di antara orang, kelompok, atau bangsa
      dengan tujuan atau sudut pandang yang sama.
  usage: Use 'alignment' to ensure everyone on the team is on the same page and working
    towards the same goal.
  synonyms:
  - agreement
  - coordination
  examples:
    workplace:
    - We need to have an alignment meeting to make sure we all agree on the project
      scope.
    - There was a lack of alignment between the design and development teams.
    casual:
    - My tires are out of alignment, so the car is pulling to one side.
    - The planets are in alignment tonight.
  related:
  - word: Sync up
    difference: '''Sync up'' is the action of meeting to get into alignment. ''Alignment''
      is the state of being in agreement.'
  - word: Consensus
    difference: '''Consensus'' is a general agreement that everyone accepts. ''Alignment''
      is more about working together towards a specific goal, even if there are minor
      disagreements on how to get there.'
  story: 'Before starting the new sprint, our team lead scheduled a meeting to ensure
    alignment. The designers presented their mockups, and the developers discussed
    the technical implementation. By the end of the meeting, everyone had a clear
    understanding of the goals and their individual responsibilities. This alignment
    helped prevent misunderstandings later in the sprint.

    '
- word: Backlog
  pronunciation: /ˈbæk.lɒɡ/
  part_of_speech: noun
  meaning:
    english: A prioritized list of tasks, features, or bug fixes that need to be done
      but are not currently being worked on. It's a to-do list for the team.
    bahasa: Daftar tugas, fitur, atau perbaikan bug yang diprioritaskan yang perlu
      dilakukan tetapi saat ini tidak sedang dikerjakan. Ini adalah daftar tugas untuk
      tim.
  usage: Use 'backlog' to refer to the collection of all potential work for a project.
  synonyms:
  - to-do list
  - task list
  examples:
    workplace:
    - We have a lot of great ideas, but we need to add them to the backlog and prioritize
      them for a future sprint.
    - During sprint planning, we pull tasks from the product backlog into the sprint
      backlog.
    casual:
    - I have a huge backlog of TV shows I want to watch.
    - My email backlog is overwhelming after my vacation.
  related:
  - word: To-do list
    difference: A 'to-do list' is usually personal. A 'backlog' is typically a formal,
      shared list for a team or product, often with a system for prioritization.
  - word: Sprint
    difference: A 'sprint' contains the work you are actively doing *now*. The 'backlog'
      contains all the work you *could* do in the future.
  story: 'Our product manager is excellent at maintaining the product backlog. Every
    new feature request, user suggestion, and low-priority bug report goes into the
    backlog. Before each new sprint, we have a ''backlog grooming'' session where
    we review the items, estimate how much effort they will take, and prioritize them.
    This keeps us organized and ensures we''re always working on the most valuable
    things first.

    '
- word: Bandwidth
  pronunciation: /ˈbænd.wɪdθ/
  part_of_speech: noun
  meaning:
    english: A person's capacity to take on more work or handle more information.
    bahasa: Kapasitas seseorang untuk menerima pekerjaan tambahan atau menangani lebih
      banyak informasi.
  usage: Use 'bandwidth' in a professional context to talk about your or someone else's
    availability and ability to handle tasks. It's a polite way to say you're too
    busy.
  synonyms:
  - capacity
  - availability
  examples:
    workplace:
    - I don't have the bandwidth to take on another project right now.
    - Let's check with Sarah to see if she has the bandwidth to help with this bug.
    casual:
    - Sorry, I can't join the movie night, just not enough bandwidth this week with
      all the chores.
    - I'd love to learn guitar, but I don't have the mental bandwidth for a new hobby
      at the moment.
  related:
  - word: Capacity
    difference: '''Capacity'' is a more general term for ability. ''Bandwidth'' is
      a modern, informal business slang that specifically refers to work capacity,
      often related to time and mental load.'
  - word: Availability
    difference: '''Availability'' refers to the time you have free. ''Bandwidth''
      refers to the energy and mental capacity you have to do work within that time.'
  story: 'During our sprint planning meeting, the project manager proposed a new feature.
    My team lead looked at our current tasks and said, ''That''s a great idea, but
    we need to be realistic about our bandwidth. The team is already fully committed
    to finishing the payment gateway. Let''s put this in the backlog for now.'' It
    was a good way of protecting the team from burnout.

    '
- word: Blocker
  pronunciation: /ˈblɒk.ər/
  part_of_speech: noun
  meaning:
    english: An issue or problem that is completely preventing you from making progress
      on a task.
    bahasa: Sebuah masalah atau problem yang sepenuhnya menghalangi Anda untuk membuat
      kemajuan pada suatu tugas.
  usage: Use 'blocker' during stand-up meetings or in project updates to signal that
    you are stuck and need help.
  synonyms:
  - obstacle
  - impediment
  examples:
    workplace:
    - I can't continue with the front-end work. The API is not ready, so that's my
      main blocker.
    - Do you have any blockers we can help you with?
    casual:
    - My main blocker to cleaning the garage is that I don't know where to start.
    - Lack of motivation is a real blocker for my gym schedule.
  related:
  - word: Problem
    difference: A 'problem' is any issue. A 'blocker' is a specific type of problem
      that stops all progress. It's more severe.
  - word: Hurdle
    difference: A 'hurdle' is an obstacle you need to overcome, but it might not completely
      stop your progress. A 'blocker' is a wall.
  story: 'During our daily stand-up meeting, I gave my update: ''Yesterday I was working
    on the user login page. Today, I plan to continue, but I have a blocker. I need
    the API key for the Google sign-in service, and I don''t have the credentials.''
    Our team lead immediately took note and said he would get me the key after the
    meeting. Identifying the blocker clearly allowed the team to resolve it quickly.

    '
- word: Bottleneck
  pronunciation: /ˈbɒt.əl.nek/
  part_of_speech: noun
  meaning:
    english: A point of congestion or blockage in a system that slows down the entire
      process. In software, it's often a piece of code or a service that can't handle
      the load.
    bahasa: Titik kemacetan atau penyumbatan dalam sebuah sistem yang memperlambat
      keseluruhan proses. Dalam perangkat lunak, ini sering kali berupa bagian kode
      atau layanan yang tidak dapat menangani beban.
  usage: Use 'bottleneck' to describe the specific part of a process or system that
    is causing a slowdown.
  synonyms:
  - choke point
  - congestion
  examples:
    workplace:
    - The database query is the main bottleneck in our application's performance.
    - We need to identify the bottleneck in our deployment pipeline to speed things
      up.
    casual:
    - The real bottleneck in my morning routine is deciding what to wear.
    - There's a huge bottleneck on the highway because of an accident.
  related:
  - word: Blocker
    difference: A 'blocker' is something that completely stops you from working. A
      'bottleneck' slows things down but doesn't necessarily stop them completely.
  - word: Performance issue
    difference: A 'performance issue' is the general problem (e.g., the app is slow).
      A 'bottleneck' is the specific cause of that problem.
  story: 'Our e-commerce site was running incredibly slow during peak hours. We did
    a performance analysis and found that while the web servers were fine, the payment
    processing service could only handle 10 requests per second. This was the clear
    bottleneck. All user requests were getting stuck waiting for this one slow service.
    Once we optimized the payment processing, the entire system became much faster.

    '
- word: Brownfield
  pronunciation: /ˈbraʊn.fiːld/
  part_of_speech: adjective
  meaning:
    english: Describes a project that adds to or modifies an existing system. The
      project must deal with legacy code, existing infrastructure, and previous design
      decisions.
    bahasa: Menjelaskan proyek yang menambah atau memodifikasi sistem yang sudah ada.
      Proyek tersebut harus berurusan dengan kode lama, infrastruktur yang ada, dan
      keputusan desain sebelumnya.
  usage: Use 'brownfield' to describe the common situation where you have to build
    on top of, or integrate with, older systems.
  synonyms:
  - legacy project
  - integration project
  examples:
    workplace:
    - This isn't a greenfield project; we have to integrate with the old Oracle database,
      which is challenging.
    - Most of the work we do is brownfield development, improving our existing application.
    casual:
    - Renovating an old house is a brownfield project; you have to work with the existing
      structure.
    - Trying to teach my grandpa how to use a smartphone is a brownfield project.
  related:
  - word: Greenfield
    difference: '''Greenfield'' is starting a project from scratch. ''Brownfield''
      is working on an existing one.'
  - word: Refactor
    difference: '''Refactoring'' is an activity you often do during ''brownfield''
      development to improve the existing code you have to work with.'
  story: 'Our new task was to add a modern recommendation engine to our 10-year-old
    e-commerce site. This was a classic brownfield project. We couldn''t just build
    it in isolation. We had to carefully integrate with the old user database, the
    messy product catalog system, and the outdated front-end code. It required a lot
    of careful planning to avoid breaking anything in the existing system.

    '
- word: Changelog
  pronunciation: /ˈtʃeɪndʒ.lɒɡ/
  part_of_speech: noun
  meaning:
    english: A log or record of all notable changes made to a project, such as a software
      application or website.
    bahasa: Catatan atau rekam jejak dari semua perubahan penting yang dibuat pada
      sebuah proyek, seperti aplikasi perangkat lunak atau situs web.
  usage: Use 'changelog' to refer to the document that lists new features, bug fixes,
    and other changes in a new release.
  synonyms:
  - release notes
  - update history
  examples:
    workplace:
    - Check the changelog to see what's new in this version.
    - I'll update the changelog before we deploy the new release.
    casual:
    - The game update came with a long changelog detailing all the balance changes.
    - I wish my phone's OS update had a clearer changelog.
  related:
  - word: Commit history
    difference: '''Commit history'' is a detailed, low-level log of all code changes
      in version control. A ''changelog'' is a high-level summary of user-facing changes.'
  - word: Release notes
    difference: These terms are often used interchangeably. However, 'release notes'
      can be more marketing-focused, while a 'changelog' is typically a more straightforward
      list of changes.
  story: 'Before deploying the new version of our app, I was responsible for preparing
    the changelog. I went through all the completed tickets for the sprint and summarized
    the key changes. I listed the new features, the bugs we fixed, and a few performance
    improvements we made. This changelog helps our users understand what to expect
    from the update.

    '
- word: Code review
  pronunciation: /koʊd rɪˈvjuː/
  part_of_speech: noun
  meaning:
    english: A process where developers other than the code's author examine a piece
      of code. The main purpose is to find and fix mistakes, improve code quality,
      and share knowledge.
    bahasa: Sebuah proses di mana pengembang selain penulis kode memeriksa sepotong
      kode. Tujuan utamanya adalah untuk menemukan dan memperbaiki kesalahan, meningkatkan
      kualitas kode, dan berbagi pengetahuan.
  usage: Use 'code review' to refer to the practice of checking a teammate's code
    before it is merged.
  synonyms:
  - peer review
  - code inspection
  examples:
    workplace:
    - I've submitted my code for review, can you please take a look?
    - A thorough code review can catch bugs before they reach production.
    casual:
    - I asked my friend to do a quick 'life review' of my new resume.
    - The editor is doing a final review of the book before it goes to print.
  related:
  - word: Pull Request (PR)
    difference: A 'pull request' is a feature of version control systems like Git
      that allows developers to propose changes. The 'code review' is the process
      that happens on that pull request.
  - word: Walkthrough
    difference: A 'walkthrough' is about explaining code to someone. A 'code review'
      is about critiquing code to improve it.
  story: 'After I finished my feature, I created a pull request and assigned it to
    a senior developer for a code review. She left several comments on my code, pointing
    out a potential bug, suggesting a more efficient way to write a function, and
    reminding me to add some unit tests. Her feedback was very helpful, and after
    I made the changes, the code was much better.

    '
- word: Deadline
  pronunciation: /ˈded.laɪn/
  part_of_speech: noun
  meaning:
    english: A specific time or date by which something must be finished.
    bahasa: Waktu atau tanggal tertentu di mana sesuatu harus diselesaikan.
  usage: Use 'deadline' to refer to the due date for a task or project.
  synonyms:
  - due date
  - cutoff point
  examples:
    workplace:
    - The deadline for this project is the end of the month.
    - We are working hard to meet the deadline.
    casual:
    - The deadline for submitting my college application is tomorrow.
    - I have a personal deadline to finish reading this book by Sunday.
  related:
  - word: Timeline
    difference: A 'timeline' is a plan for when things will happen. A 'deadline' is
      the final point on that timeline when the work must be done.
  - word: Milestone
    difference: A 'milestone' is a significant point in a project's timeline. A 'deadline'
      is the final milestone for a task or the entire project.
  story: 'Our team was given a strict deadline to launch the new marketing website.
    We had only two weeks to complete the entire project from scratch. The pressure
    was high, and we had to work efficiently to meet the deadline. We broke down the
    work into smaller tasks and assigned them to different team members. In the end,
    we managed to launch the website just a few hours before the deadline.

    '
- word: Deep dive
  pronunciation: /diːp daɪv/
  part_of_speech: phrase
  meaning:
    english: To do an in-depth investigation or analysis of a specific topic or issue.
    bahasa: Melakukan investigasi atau analisis mendalam terhadap topik atau masalah
      tertentu.
  usage: Use 'deep dive' when you're going to spend a significant amount of time and
    effort to fully understand a complex subject.
  synonyms:
  - thorough analysis
  - comprehensive review
  examples:
    workplace:
    - We need to do a deep dive into the performance issues with the database.
    - Next week, I'm doing a deep dive on the new framework to see if it fits our
      needs.
    casual:
    - I did a deep dive on YouTube last night and learned all about ancient Roman
      history.
    - She's doing a deep dive into classic literature this summer.
  related:
  - word: Investigate
    difference: '''Investigate'' is a standard term. ''Deep dive'' is a more modern,
      informal business term that emphasizes the depth and intensity of the investigation.'
  - word: Look into
    difference: '''Look into'' implies a brief, surface-level examination. A ''deep
      dive'' is the opposite; it''s a thorough and detailed exploration.'
  story: 'Our application was running slowly, but we didn''t know why. The initial
    checks didn''t reveal anything obvious. So, our senior engineer decided it was
    time for a ''deep dive''. She blocked off her entire afternoon, armed herself
    with profiling tools, and went through the code, layer by layer. After a few hours,
    she emerged with a detailed analysis of the bottlenecks. The deep dive was successful.

    '
- word: Drill down
  pronunciation: /drɪl daʊn/
  part_of_speech: phrase
  meaning:
    english: To move from summary information to more detailed data. To investigate
      something more thoroughly.
    bahasa: Beralih dari informasi ringkasan ke data yang lebih rinci. Menyelidiki
      sesuatu dengan lebih teliti.
  usage: Use 'drill down' when you need to get more details about a problem, a report,
    or a set of data.
  synonyms:
  - investigate further
  - dig deeper
  examples:
    workplace:
    - The dashboard shows an increase in errors. We need to drill down to see which
      component is causing them.
    - Let's drill down into the user feedback from last week's release.
    casual:
    - I'm not sure I understand. Can you drill down on that point a bit more?
    - He started with a general topic and then drilled down into the specifics.
  related:
  - word: Analyze
    difference: '''Analyze'' is a general term for examining something. ''Drill down''
      specifically implies starting from a high-level view and moving to a more detailed
      one.'
  - word: Deep dive
    difference: A 'deep dive' is a comprehensive, in-depth investigation of a topic.
      To 'drill down' is often one of the actions you take *during* a deep dive.
  story: 'Our weekly performance report showed that user engagement was down by 5%.
    This high-level number was concerning, but not very useful. During our team meeting,
    the product manager said, "Okay, we need to drill down into this data." We applied
    filters to the report, first looking at engagement by country, then by device
    type, and finally by user age group. By drilling down, we discovered the drop
    was almost entirely from users on older Android devices, which helped us pinpoint
    the problem.

    '
- word: Edge case
  pronunciation: /ˈedʒ ˌkeɪs/
  part_of_speech: phrase
  meaning:
    english: A problem or situation that occurs only at an extreme (maximum or minimum)
      operating parameter. A rare situation that code needs to handle gracefully.
    bahasa: Masalah atau situasi yang hanya terjadi pada parameter operasi yang ekstrem
      (maksimum atau minimum). Situasi langka yang harus ditangani oleh kode dengan
      baik.
  usage: Use 'edge case' when discussing potential problems that are not part of the
    normal workflow but could still happen.
  synonyms:
  - corner case
  - rare scenario
  examples:
    workplace:
    - Our code works for typical users, but what about the edge case where a user
      has no friends in their contact list?
    - We need to write tests for all the edge cases, like uploading an empty file
      or a file that is gigabytes in size.
    casual:
    - Most people will have a great experience, but there's always an edge case.
    - He's worried about a million edge cases, but we should focus on the main problem
      first.
  related:
  - word: Bug
    difference: An 'edge case' is a situation. A 'bug' is what happens when your code
      doesn't handle that situation correctly.
  - word: Happy path
    difference: The 'happy path' is the default scenario with no errors or exceptions.
      'Edge cases' are all the other scenarios that can happen outside the happy path.
  story: 'We built a new feature that allows users to enter their birthday. The ''happy
    path'' test, where a user enters a valid date, passed perfectly. But then, our
    QA tester started testing for edge cases. What if the user enters February 29th
    on a non-leap year? What if they enter a date in the future? What if they try
    to enter text instead of a date? We found several bugs because our code didn''t
    handle these edge cases properly.

    '
- word: Greenfield
  pronunciation: /ˈɡriːn.fiːld/
  part_of_speech: adjective
  meaning:
    english: Describes a new project that is starting from scratch, with no legacy
      code or existing systems to consider. It's a 'clean slate'.
    bahasa: Menjelaskan proyek baru yang dimulai dari awal, tanpa kode lama atau sistem
      yang ada untuk dipertimbangkan. Ini adalah 'lembaran bersih'.
  usage: Use 'greenfield' to describe the exciting opportunity of building something
    brand new, without the constraints of past decisions.
  synonyms:
  - from scratch
  - brand new
  examples:
    workplace:
    - I'm so excited to be on this greenfield project; we get to choose the entire
      tech stack.
    - Most developers dream of working on a greenfield project, but they are quite
      rare.
    casual:
    - Starting a new hobby is like a greenfield project for your life.
    - He moved to a new city for a complete greenfield start.
  related:
  - word: Brownfield
    difference: '''Brownfield'' is the opposite. It describes a project that must
      work with or modify existing systems (''legacy code'').'
  - word: Legacy code
    difference: '''Legacy code'' is the old code you have to deal with in a ''brownfield''
      project. A ''greenfield'' project has no legacy code.'
  story: 'Our company decided to build a completely new mobile application, separate
    from all our existing websites. It was a true greenfield project. The team got
    to sit down and decide everything from the ground up: the programming language,
    the architecture, the database, and the cloud provider. There were no past mistakes
    or technical debt to worry about. It was a challenging but incredibly rewarding
    experience.

    '
- word: Grooming
  pronunciation: /ˈɡruː.mɪŋ/
  part_of_speech: noun
  meaning:
    english: Also known as backlog refinement, it's a recurring meeting in Agile where
      the team discusses, estimates, and prioritizes items in the product backlog.
    bahasa: Juga dikenal sebagai penyempurnaan backlog, ini adalah pertemuan berulang
      dalam Agile di mana tim membahas, memperkirakan, dan memprioritaskan item dalam
      backlog produk.
  usage: Use 'grooming' or 'backlog refinement' to refer to the activity of preparing
    the backlog for future sprints.
  synonyms:
  - backlog refinement
  - backlog management
  examples:
    workplace:
    - We have a backlog grooming session every Wednesday.
    - During grooming, we realized that one of the user stories was too large and
      needed to be split.
    casual:
    - The cat is grooming itself in the sun.
    - He is very particular about his personal grooming.
  related:
  - word: Sprint planning
    difference: '''Grooming'' is about preparing the backlog for the future. ''Sprint
      planning'' is the meeting where the team decides which well-groomed items to
      work on in the next sprint.'
  - word: Backlog
    difference: The 'backlog' is the list of work to be done. 'Grooming' is the process
      of keeping that list clean, organized, and prioritized.
  story: 'In our weekly backlog grooming meeting, the product manager presented a
    few new user stories. We discussed each one as a team to make sure we understood
    the requirements. We asked questions, clarified acceptance criteria, and added
    estimates. This grooming process is essential because it ensures that when we
    start a new sprint, the work is well-defined and ready to be developed.

    '
- word: Handover
  pronunciation: /ˈhænd.əʊ.vər/
  part_of_speech: noun
  meaning:
    english: The process of transferring responsibility and knowledge for a project
      or task from one person to another.
    bahasa: Proses pengalihan tanggung jawab dan pengetahuan untuk suatu proyek atau
      tugas dari satu orang ke orang lain.
  usage: Use 'handover' when someone is leaving a project or company, and they need
    to explain their work to the person taking over.
  synonyms:
  - knowledge transfer
  - transition
  examples:
    workplace:
    - Before you go on vacation, please prepare a proper handover document for your
      projects.
    - The handover from the previous developer was not very good, so I'm struggling
      to understand the code.
    casual:
    - The handover of the apartment keys will happen tomorrow.
    - There was a smooth handover of power between the two club presidents.
  related:
  - word: Walkthrough
    difference: A 'walkthrough' is a demonstration to explain something. A 'handover'
      is a full transfer of responsibility, which might include a walkthrough as one
      of its steps.
  - word: Documentation
    difference: '''Documentation'' is the written material about a project. A ''handover''
      is the *process* of using that documentation (and other means) to transfer ownership.'
  story: 'One of our developers was moving to another team. In his last week, he focused
    on the handover. He wrote detailed documentation for the services he managed,
    held a two-hour meeting with the developer who would be taking over, and made
    sure all his recent code was clean and well-commented. Because the handover was
    so thorough, the transition was seamless and the project continued without any
    issues.

    '
- word: Hard-coded
  pronunciation: /ˌhɑːrdˈkoʊ.dɪd/
  part_of_speech: adjective
  meaning:
    english: Describes a value or configuration that is fixed directly in the source
      code instead of being loaded from an external source (like a config file or
      a database).
    bahasa: Menjelaskan nilai atau konfigurasi yang ditetapkan secara langsung di
      dalam kode sumber alih-alih dimuat dari sumber eksternal (seperti file konfigurasi
      atau database).
  usage: Use 'hard-coded' to criticize data that is not flexible. It's generally bad
    practice because changing the value requires changing the code itself.
  synonyms:
  - embedded
  - fixed
  examples:
    workplace:
    - Don't leave the API key hard-coded in the source code; put it in an environment
      variable.
    - The tax rate is hard-coded, so we have to create a new deployment every time
      it changes.
    casual:
    - My first program had everything hard-coded, even the user's name!
    - It's a quick and dirty solution, with a lot of hard-coded values.
  related:
  - word: Dynamic
    difference: '''Dynamic'' values are fetched when needed and can change easily.
      ''Hard-coded'' values are static and fixed in the code.'
  - word: Configuration
    difference: '''Configuration'' refers to settings that are external to the code.
      ''Hard-coding'' is the practice of putting those settings inside the code.'
  story: 'A junior developer was working on a feature to display a list of products.
    In his code, he wrote: `const url = ''http://test.api.example.com/products'';`.
    During code review, his senior pointed out that the API URL was hard-coded. "What
    happens when we move to production?" she asked. "We would have to find this line
    and change the code." She explained that the URL should be loaded from a configuration
    file, so they could use a different URL for testing and production without touching
    the code.

    '
- word: Heads-up
  pronunciation: /ˈhedz ʌp/
  part_of_speech: phrase
  meaning:
    english: An advance notice or warning to give someone time to prepare for something.
    bahasa: Pemberitahuan atau peringatan di muka untuk memberi seseorang waktu untuk
      mempersiapkan sesuatu.
  usage: Use 'heads-up' to informally warn someone about something that is going to
    happen.
  synonyms:
  - advance notice
  - warning
  examples:
    workplace:
    - Just a heads-up, we're planning to deploy the new version tomorrow morning.
    - Thanks for the heads-up about the meeting, I almost forgot.
    casual:
    - Heads-up, your parents are visiting this weekend.
    - Can you give me a heads-up when you're about to leave?
  related:
  - word: FYI (For Your Information)
    difference: '''FYI'' is for sharing information that might be useful. A ''heads-up''
      is specifically for warning someone about a future event so they can prepare.'
  - word: Alert
    difference: '''Alert'' is more formal and often used for automated system notifications
      about something happening right now (e.g., ''high CPU alert''). A ''heads-up''
      is an informal, person-to-person warning about something in the future.'
  story: 'On Friday afternoon, our senior engineer sent a message to the team channel:
    "Just a heads-up, I''ll be merging the new database schema changes on Monday morning.
    This might cause some brief downtime for the test environment." This heads-up
    was incredibly helpful. It allowed all of us to finish our work in the test environment
    before Monday and saved us from the surprise of finding the system down when we
    started our week.

    '
- word: Hotfix
  pronunciation: /ˈhɒt.fɪks/
  part_of_speech: noun
  meaning:
    english: A critical bug fix that is urgently needed and is often released outside
      of the normal release cycle.
    bahasa: Perbaikan bug kritis yang sangat dibutuhkan dan seringkali dirilis di
      luar siklus rilis normal.
  usage: Use 'hotfix' to describe an emergency fix for a production issue.
  synonyms:
  - patch
  - emergency fix
  examples:
    workplace:
    - We need to deploy a hotfix to solve the login issue on the production server.
    - The team is working on a hotfix for the critical security vulnerability.
    casual:
    - My phone just got a small update, probably a hotfix for a bug.
    - I had to do a hotfix on my leaky faucet with some tape.
  related:
  - word: Bug fix
    difference: A 'bug fix' is any change that fixes a bug. A 'hotfix' is a specific
      type of bug fix that is urgent and critical.
  - word: Patch
    difference: '''Patch'' is a more general term for a piece of code that is applied
      to fix or improve a program. A ''hotfix'' is a type of patch that is critical
      and urgent.'
  story: 'On Friday afternoon, our monitoring system alerted us that users were unable
    to complete purchases. We quickly identified a critical bug in the payment gateway
    integration. Since this was a major issue, we had to prepare a hotfix. The team
    worked late to fix the bug, test it, and deploy it directly to production. The
    hotfix resolved the issue and saved the company from losing a lot of revenue.

    '
- word: Latency
  pronunciation: /ˈleɪ.tən.si/
  part_of_speech: noun
  meaning:
    english: The delay between a user's action and the time it takes for a system
      to respond. The time it takes for a data packet to travel from one point to
      another.
    bahasa: Penundaan antara tindakan pengguna dan waktu yang dibutuhkan sistem untuk
      merespons. Waktu yang dibutuhkan paket data untuk melakukan perjalanan dari
      satu titik ke titik lain.
  usage: Use 'latency' to talk about the speed and responsiveness of a system from
    a user's perspective.
  synonyms:
  - delay
  - lag
  examples:
    workplace:
    - We need to reduce the latency of our search API to improve the user experience.
    - Users in Australia are experiencing high latency because our servers are in
      Europe.
    casual:
    - There is a noticeable latency when I use my Bluetooth headphones.
    - The latency in our video call was so bad we couldn't understand each other.
  related:
  - word: Bandwidth
    difference: '''Bandwidth'' is the maximum amount of data that can be transferred
      over a network in a given amount of time. ''Latency'' is the time it takes for
      that data to start moving.'
  - word: Throughput
    difference: '''Latency'' is about how fast you get a response. ''Throughput''
      is about how many responses you can get in a period of time.'
  story: 'Our website felt sluggish, even though the servers were not under heavy
    load. We investigated and found that the main issue was latency. The initial page
    load was slow because it had to make multiple requests to different services,
    and each request added a small delay. By bundling some of these requests together,
    we were able to significantly reduce the overall latency and make the site feel
    much faster.

    '
- word: Legacy code
  pronunciation: /ˈleɡ.ə.si koʊd/
  part_of_speech: phrase
  meaning:
    english: Old source code that is no longer supported or is difficult to maintain,
      but is still in use. It's often inherited from a previous team or version of
      a project.
    bahasa: Kode sumber lama yang tidak lagi didukung atau sulit untuk dipelihara,
      tetapi masih digunakan. Seringkali diwarisi dari tim atau versi proyek sebelumnya.
  usage: Use 'legacy code' to describe old, messy, or poorly understood code that
    you have to work with.
  synonyms:
  - old code
  - inherited code
  examples:
    workplace:
    - We have to be careful when changing this module; it's full of legacy code.
    - My task for this sprint is to refactor a large piece of legacy code.
    casual:
    - I opened up a file and it looks like it was written a decade ago. Total legacy
      code.
    - I'm always scared to touch the legacy code in this project.
  related:
  - word: Technical debt
    difference: '''Legacy code'' is a common cause of ''technical debt'' (the implied
      cost of rework caused by choosing an easy solution now instead of using a better
      approach that would take longer). But you can also accumulate technical debt
      in new code.'
  - word: Boilerplate code
    difference: '''Boilerplate'' is repetitive code that is needed in many places
      with little to no alteration (e.g., setting up a new component). ''Legacy code''
      refers to the age and maintainability of code, not its repetitiveness.'
  story: 'I was assigned a bug fix in the user authentication system. When I opened
    the files, I realized I was dealing with legacy code. It was written 8 years ago
    by a developer who had long since left the company. There were no comments, no
    documentation, and the coding style was completely different from our current
    standards. Fixing a simple bug took me three days because I had to carefully navigate
    the fragile and complex legacy code.

    '
- word: Merge
  pronunciation: /mɜːrdʒ/
  part_of_speech: verb
  meaning:
    english: In version control, to combine changes from different branches into a
      single branch.
    bahasa: Dalam kontrol versi, untuk menggabungkan perubahan dari cabang yang berbeda
      ke dalam satu cabang tunggal.
  usage: Use 'merge' when you are combining your code changes with the main codebase.
  synonyms:
  - integrate
  - combine
  examples:
    workplace:
    - After the code review is approved, I will merge my branch into the main branch.
    - We had a merge conflict that took an hour to resolve.
    casual:
    - The two companies decided to merge into one.
    - She knows how to merge her personal and professional life.
  related:
  - word: Branch
    difference: A 'branch' is an independent line of development. To 'merge' is to
      combine that branch with another one.
  - word: Commit
    difference: A 'commit' is a single saved change in version control. To 'merge'
      is to combine a series of commits from one branch into another.
  story: 'I had been working on a new feature in my own branch for a week. After my
    pull request was approved, it was finally time to merge my changes into the main
    development branch. I clicked the ''merge'' button and watched as my code was
    integrated with the work of the rest of the team. Now, my feature is officially
    part of the project.

    '
- word: Nitty-gritty
  pronunciation: /ˌnɪt.iˈɡrɪt.i/
  part_of_speech: noun
  meaning:
    english: The most important, practical details of a subject or situation. The
      essential, and often messy, core of a problem.
    bahasa: Detail yang paling penting dan praktis dari suatu subjek atau situasi.
      Inti yang esensial, dan seringkali berantakan, dari suatu masalah.
  usage: Use 'nitty-gritty' when you're ready to stop talking about high-level ideas
    and start discussing the specific, detailed work that needs to be done.
  synonyms:
  - core details
  - essentials
  examples:
    workplace:
    - Okay, the high-level plan is approved. Now let's get into the nitty-gritty of
      how we're going to implement this.
    - I understand the concept, but I need you to explain the nitty-gritty details
      of the algorithm.
    casual:
    - I love planning vacations, but my husband handles the nitty-gritty of booking
      flights and hotels.
    - He's a big-picture guy; he doesn't enjoy the nitty-gritty.
  related:
  - word: Details
    difference: '''Details'' is a general term. ''Nitty-gritty'' refers specifically
      to the most essential, practical, and sometimes unglamorous details.'
  - word: Deep dive
    difference: A 'deep dive' is the *act* of investigating something thoroughly.
      The 'nitty-gritty' is the *thing* you discover during that deep dive.
  story: 'In the project kickoff meeting, we talked about the vision and the high-level
    goals. But in the next meeting, with just the engineers, our tech lead said, "Alright
    team, time to get down to the nitty-gritty." We spent the next two hours discussing
    the specific database schema, the exact API endpoints, the error handling logic,
    and the security considerations. We were finally talking about the real, practical
    work.

    '
- word: Offload
  pronunciation: /ˈɒf.ləʊd/
  part_of_speech: verb
  meaning:
    english: To delegate or give a task or responsibility to someone else, often to
      reduce your own workload.
    bahasa: Mendelegasikan atau memberikan tugas atau tanggung jawab kepada orang
      lain, seringkali untuk mengurangi beban kerja Anda sendiri.
  usage: Use 'offload' when you are passing work to another person, team, or system.
  synonyms:
  - delegate
  - hand off
  examples:
    workplace:
    - I'm too busy this week, I need to offload some of my tasks to a junior developer.
    - We can offload the image processing to a separate service to improve performance.
    casual:
    - Can I offload the grocery shopping to you this week?
    - He tried to offload all the difficult chores onto his younger brother.
  related:
  - word: Delegate
    difference: '''Delegate'' is a more formal term, often used by managers. ''Offload''
      is more informal and emphasizes the goal of reducing one''s own burden.'
  - word: Assign
    difference: '''Assign'' is a neutral term for giving someone a task. ''Offload''
      implies that the person giving the task was originally responsible for it.'
  story: 'Our senior engineer, Ken, was responsible for both developing new features
    and managing our cloud infrastructure. He was getting overwhelmed. To help him,
    the team decided to hire a dedicated DevOps engineer. This allowed Ken to offload
    all the infrastructure management tasks to the new hire, freeing him up to focus
    entirely on writing code.

    '
- word: On the fly
  pronunciation: /ɒn ðə flaɪ/
  part_of_speech: phrase
  meaning:
    english: To do something quickly, without much preparation, often in response
      to a situation as it happens.
    bahasa: Melakukan sesuatu dengan cepat, tanpa banyak persiapan, seringkali sebagai
      respons terhadap situasi yang sedang terjadi.
  usage: Use 'on the fly' when you have to make a quick decision or create something
    spontaneously.
  synonyms:
  - spontaneously
  - impromptu
  examples:
    workplace:
    - The client asked for a different layout, so I had to change the CSS on the fly
      during the presentation.
    - We don't have a script for this, we'll just have to figure it out on the fly.
    casual:
    - I didn't have a recipe, so I just made up the sauce on the fly.
    - He's great at giving speeches on the fly.
  related:
  - word: Improvise
    difference: '''Improvise'' is a good synonym. ''On the fly'' is a bit more common
      in tech and business settings and often relates to making adjustments to a plan
      that''s already in motion.'
  - word: Spontaneously
    difference: '''Spontaneously'' describes an action that arises from a sudden internal
      impulse. ''On the fly'' describes an action that is a reaction to external events
      as they unfold.'
  story: 'We were doing a live demo of our new software for a potential client. Suddenly,
    the client asked, ''Can it do X?'' We hadn''t prepared for that question, and
    the feature wasn''t fully polished. My manager, a quick thinker, started coding
    a small script on the fly while I kept the client engaged. In a few minutes, he
    had a working prototype. The client was very impressed with our ability to adapt
    on the fly.

    '
- word: On-call
  pronunciation: /ˈɒn.kɔːl/
  part_of_speech: phrase
  meaning:
    english: The practice of designating a person to be available to respond to urgent
      system issues or emergencies outside of normal working hours.
    bahasa: Praktik menunjuk seseorang untuk bersiap sedia menanggapi masalah sistem
      yang mendesak atau keadaan darurat di luar jam kerja normal.
  usage: Use 'on-call' to describe the responsibility of being available to fix production
    issues at any time, often on a rotating schedule.
  synonyms:
  - on duty
  - on standby
  examples:
    workplace:
    - I can't go out tonight, I'm on-call for my team.
    - Our on-call engineer was paged at 3 AM because a server went down.
    casual:
    - My sister is a doctor, so she is often on-call at the hospital.
    - As a parent of a newborn, you feel like you are on-call 24/7.
  related:
  - word: Pager duty
    difference: '''PagerDuty'' is the name of a popular software service used to manage
      on-call schedules and alerts. ''On-call'' is the general term for the practice.'
  - word: Support
    difference: '''Support'' is a broad term for helping users. ''On-call'' is a specific
      role focused on responding to urgent technical emergencies.'
  story: 'This week, it''s my turn to be on-call. This means I have to carry a special
    phone with me at all times. If any of our critical systems have an outage, I will
    get an alert and I am expected to respond immediately, even if it''s in the middle
    of the night. It''s a stressful responsibility, but it''s essential to ensure
    our service is reliable for our users.

    '
- word: Outage
  pronunciation: /ˈaʊ.tɪdʒ/
  part_of_speech: noun
  meaning:
    english: A period of time when a service, like a website or an application, is
      not available or not working correctly.
    bahasa: Periode waktu ketika sebuah layanan, seperti situs web atau aplikasi,
      tidak tersedia atau tidak berfungsi dengan benar.
  usage: Use 'outage' to describe a situation where your system is down.
  synonyms:
  - downtime
  - service interruption
  examples:
    workplace:
    - We had a major outage last night, the website was down for two hours.
    - The team is working hard to resolve the current outage.
    casual:
    - There's a power outage in my neighborhood.
    - I couldn't call you because of a network outage.
  related:
  - word: Crash
    difference: A 'crash' is when a program stops working suddenly. An 'outage' is
      the user-facing result of that crash, where the service becomes unavailable.
  - word: Bug
    difference: A 'bug' is an error in the code. A severe 'bug' can *cause* an 'outage'.
  story: 'At 3 AM, our monitoring system sent an alert to the on-call engineer. The
    main application was down. It was a major outage. The engineer immediately woke
    up, got on her computer, and started investigating. She communicated with the
    team on Slack, and together they found the cause: a recent deployment had a critical
    bug. They quickly rolled back the change, and after 30 minutes of downtime, the
    service was restored.

    '
- word: Ping
  pronunciation: /pɪŋ/
  part_of_speech: verb
  meaning:
    english: To send a quick digital message to someone to get their attention or
      a quick response.
    bahasa: Mengirim pesan digital singkat kepada seseorang untuk mendapatkan perhatian
      atau respons cepat.
  usage: Use 'ping' when you're talking about sending a quick message on a chat platform
    like Slack, Microsoft Teams, or Discord. It's informal and very common.
  synonyms:
  - message
  - contact
  examples:
    workplace:
    - I'll ping you on Slack with the details.
    - If you finish your part, just ping me and I'll review it.
    casual:
    - Ping me when you get home so I know you're safe.
    - I'll ping the group chat to see who's coming.
  related:
  - word: Message
    difference: '''Message'' is a general term for any text communication. ''Ping''
      specifically implies a short, quick message designed to get a fast response,
      like a poke.'
  - word: Call
    difference: A 'call' involves voice or video communication. A 'ping' is always
      text-based.
  story: 'I was stuck on a piece of code and couldn''t figure out the correct API
    endpoint to use. I remembered my colleague, David, had worked on a similar feature.
    Instead of walking over to his desk and interrupting him, I just sent him a quick
    message on Slack: ''Hey David, quick question about the user service.'' I decided
    to ping him because it was a small question, and this way he could answer whenever
    he had a free moment.

    '
- word: Post-mortem
  pronunciation: /ˌpəʊstˈmɔː.təm/
  part_of_speech: noun
  meaning:
    english: A meeting or document that analyzes a project or event after it has concluded,
      especially to understand what went wrong and how to prevent it in the future.
      The name comes from the medical term for an examination after death.
    bahasa: Sebuah rapat atau dokumen yang menganalisis sebuah proyek atau peristiwa
      setelah selesai, terutama untuk memahami apa yang salah dan bagaimana cara mencegahnya
      di masa depan. Nama ini berasal dari istilah medis untuk pemeriksaan setelah
      kematian.
  usage: Use 'post-mortem' for the process of analyzing a failure (like an outage)
    or even a success, to learn from it.
  synonyms:
  - retrospective
  - debrief
  examples:
    workplace:
    - We're holding a post-mortem tomorrow to discuss the recent production outage.
    - The post-mortem report identified the root cause of the failure and listed action
      items to prevent it from happening again.
    casual:
    - After our failed camping trip, we had a post-mortem about what to do differently
      next time.
    - They did a post-mortem of their election campaign to see what went wrong.
  related:
  - word: Retrospective
    difference: A 'retrospective' is a regular meeting (often in Agile/Scrum) to review
      the last period of work (e.g., a sprint). A 'post-mortem' is specifically held
      in response to a significant event, usually a failure.
  - word: Blameless
    difference: A 'blameless post-mortem' is a key practice in modern tech culture.
      It means the goal of the post-mortem is to find weaknesses in the *system*,
      not to blame any individual person.
  story: 'After the major outage was resolved, our engineering manager scheduled a
    ''blameless post-mortem''. The goal was not to point fingers at who caused the
    problem. Instead, the team discussed the timeline of events, the root cause, and
    the impact. They asked questions like, "Why did our automated tests not catch
    this bug?" and "How can we make our deployment process safer?" The meeting resulted
    in several concrete action items to improve their systems.

    '
- word: Prioritize
  pronunciation: /praɪˈɒr.ɪ.taɪz/
  part_of_speech: verb
  meaning:
    english: To decide which of a group of things are the most important so that you
      can deal with them first.
    bahasa: Memutuskan mana dari sekelompok hal yang paling penting sehingga Anda
      dapat menanganinya terlebih dahulu.
  usage: Use 'prioritize' when you need to rank tasks or features in order of importance.
  synonyms:
  - rank
  - organize
  examples:
    workplace:
    - We need to prioritize the bug fixes before we start working on new features.
    - I have too many tasks, I need to prioritize my work for this week.
    casual:
    - I need to prioritize my bills to make sure I pay the most important ones first.
    - She has to prioritize her studies over her social life.
  related:
  - word: Triage
    difference: '''Triage'' is a specific form of prioritization, usually for bugs
      or issues, where you quickly assess their severity and decide which ones to
      handle first.'
  - word: Schedule
    difference: '''Scheduling'' is about assigning a time to a task. ''Prioritizing''
      is about deciding the importance of the task, which then helps you schedule
      it.'
  story: 'We had a long list of feature requests from the product manager. During
    our planning meeting, we had to prioritize them for the next quarter. We used
    a matrix to score each feature based on its impact and effort. This allowed us
    to prioritize the features that would deliver the most value to our users with
    the least amount of development time.

    '
- word: Quick win
  pronunciation: /kwɪk wɪn/
  part_of_speech: phrase
  meaning:
    english: A small and easy improvement that can be implemented quickly and provides
      a noticeable benefit.
    bahasa: Peningkatan kecil dan mudah yang dapat diimplementasikan dengan cepat
      dan memberikan manfaat yang nyata.
  usage: Use 'quick win' to describe tasks that have a high return on investment—low
    effort for good results. It's great for building momentum.
  synonyms:
  - low-hanging fruit
  - easy victory
  examples:
    workplace:
    - Let's start the project with a few quick wins to show progress to the stakeholders.
    - Fixing that typo on the homepage is a quick win we can deploy today.
    casual:
    - Organizing my desktop was a quick win that made me feel more productive.
    - Let's just clean the living room. It's a quick win before the guests arrive.
  related:
  - word: MVP (Minimum Viable Product)
    difference: An 'MVP' is the smallest version of a *product* you can launch. A
      'quick win' is a small *task* or improvement, often on an existing product.
  - word: Low-hanging fruit
    difference: Very similar meaning and often used interchangeably. 'Low-hanging
      fruit' is a metaphor for the easiest things to get, and 'quick win' focuses
      on the result of getting them.
  story: 'Our team was starting a huge, year-long project to rebuild our entire application.
    To keep morale high and show our managers that we were making progress, our team
    lead decided to identify a few quick wins. One of them was to add a ''dark mode''
    toggle to the current, old application. It only took one developer two days to
    implement, but users loved it. This quick win boosted the team''s confidence and
    made everyone excited for the bigger changes to come.

    '
- word: Ramp up
  pronunciation: /ræmp ʌp/
  part_of_speech: phrase
  meaning:
    english: To increase in speed, effort, or level over a period of time. In a work
      context, it often means the time it takes for a new team member to become fully
      productive.
    bahasa: Meningkat dalam kecepatan, usaha, atau level selama periode waktu tertentu.
      Dalam konteks kerja, ini sering berarti waktu yang dibutuhkan anggota tim baru
      untuk menjadi produktif sepenuhnya.
  usage: Use 'ramp up' to describe the initial period of learning and adjustment for
    a new role or project.
  synonyms:
  - get up to speed
  - onboard
  examples:
    workplace:
    - The first month is just for you to ramp up; don't worry about being super productive
      yet.
    - We need to factor in a ramp-up period for the new developers.
    casual:
    - The movie starts slow but really ramps up in the second half.
    - I need to ramp up my training before the marathon.
  related:
  - word: Onboarding
    difference: '''Onboarding'' is the formal process of integrating a new employee
      into an organization. ''Ramp up'' is the informal process of that employee learning
      and becoming productive.'
  - word: Learning curve
    difference: A 'learning curve' describes how difficult something is to learn.
      A 'ramp-up period' is the time allotted to climb that curve.
  story: 'Our team hired a new engineer, Maria. During her first week, our manager
    told her, "Don''t feel pressured to contribute code immediately. The first two
    weeks are your ramp-up period. Use this time to set up your development environment,
    read the documentation, and ask a lot of questions." This clear expectation helped
    Maria feel comfortable as she began to ramp up on the complex project.

    '
- word: Red flag
  pronunciation: /ˌred ˈflæɡ/
  part_of_speech: phrase
  meaning:
    english: A sign that indicates a potential problem, danger, or issue that requires
      attention.
    bahasa: Tanda yang menunjukkan potensi masalah, bahaya, atau isu yang memerlukan
      perhatian.
  usage: Use 'red flag' to signal that something feels wrong or risky.
  synonyms:
  - warning sign
  - alarm bell
  examples:
    workplace:
    - The fact that the code has no tests is a huge red flag for me.
    - He said the feature would be 'easy' to build, which is always a red flag.
    casual:
    - The message seemed suspicious, it had a lot of red flags.
    - For me, a big red flag on a first date is when they're rude to the waiter.
  related:
  - word: Issue
    difference: An 'issue' is a confirmed problem. A 'red flag' is a potential or
      future problem that you've noticed.
  - word: Code smell
    difference: A 'code smell' is a specific type of 'red flag' in source code that
      indicates a deeper problem (e.g., a very long function).
  story: 'We were interviewing a candidate for a senior developer position. He had
    a great resume and answered most questions well. But when we asked him about a
    time he had a disagreement with a teammate, he said he''s never had one because
    he''s always right. That was a major red flag for the entire interview panel.
    It suggested he might not be a collaborative team player, which is a critical
    skill for our team.

    '
- word: Refactor
  pronunciation: /riːˈfæk.tər/
  part_of_speech: verb
  meaning:
    english: To restructure existing computer code—changing the factoring—without
      changing its external behavior. The goal is to improve readability, reduce complexity,
      and make it easier to maintain.
    bahasa: Mestruktur ulang kode komputer yang ada—mengubah pemfaktoran—tanpa mengubah
      perilaku eksternalnya. Tujuannya adalah untuk meningkatkan keterbacaan, mengurangi
      kompleksitas, dan membuatnya lebih mudah untuk dipelihara.
  usage: Use 'refactor' when you are cleaning up or improving existing code, not adding
    new features.
  synonyms:
  - restructure
  - reorganize
  examples:
    workplace:
    - This function is working, but it's very messy. We should schedule some time
      to refactor it.
    - I'm not adding any new features this week, I'm just refactoring the old payment
      module.
    casual:
    - I'm going to refactor my closet this weekend, organize it better so I can find
      my clothes.
    - He refactored his morning routine for better productivity.
  related:
  - word: Rewrite
    difference: '''Rewriting'' code often implies starting from scratch. ''Refactoring''
      is making small, incremental improvements to existing code while ensuring it
      still works the same way.'
  - word: Optimize
    difference: '''Optimizing'' is specifically about making the code faster or more
      efficient. ''Refactoring'' is about making it cleaner and more maintainable,
      which might not always make it faster.'
  story: 'We inherited a piece of code that was written five years ago. It worked,
    but it was very difficult to understand. No one wanted to touch it. Finally, our
    tech lead decided we had to ''refactor'' it. For two weeks, we didn''t add any
    new functionality. Instead, we carefully reorganized the code, renamed variables
    to be clearer, broke down long functions into smaller ones, and added comments.
    The code did the exact same thing as before, but now it was clean, organized,
    and easy for new developers to understand.

    '
- word: Regression
  pronunciation: /rɪˈɡreʃ.ən/
  part_of_speech: noun
  meaning:
    english: The reappearance of a bug that had been previously fixed. A feature that
      stops working after a certain event, like a new code change.
    bahasa: Munculnya kembali bug yang sebelumnya telah diperbaiki. Sebuah fitur yang
      berhenti berfungsi setelah kejadian tertentu, seperti perubahan kode baru.
  usage: Use 'regression' to describe a situation where a new change breaks existing
    functionality.
  synonyms:
  - setback
  - reversion
  examples:
    workplace:
    - The latest deployment caused a regression in the user authentication module.
    - We need to write more automated tests to prevent regressions.
    casual:
    - After a week of eating healthy, having a pizza felt like a regression.
    - The patient showed signs of regression in his recovery.
  related:
  - word: Bug
    difference: A 'bug' is any kind of error in software. A 'regression' is a specific
      type of bug where something that used to work now doesn't.
  - word: Side effect
    difference: A 'side effect' is an unexpected consequence of a code change. A 'regression'
      is often a negative side effect.
  story: 'We were celebrating a successful release when a QA engineer reported a critical
    issue. The login with Google feature, which had been working for months, was suddenly
    broken. It was a classic regression. We quickly discovered that a recent library
    update had introduced a breaking change. We had to roll back the deployment and
    fix the issue properly.

    '
- word: Roadmap
  pronunciation: /ˈroʊd.mæp/
  part_of_speech: noun
  meaning:
    english: A high-level, strategic document that outlines the vision, priorities,
      and direction of a product or project over time.
    bahasa: Dokumen strategis tingkat tinggi yang menguraikan visi, prioritas, dan
      arah suatu produk atau proyek dari waktu ke waktu.
  usage: Use 'roadmap' to talk about the long-term plan for a product, usually covering
    the next few quarters or even years.
  synonyms:
  - strategic plan
  - vision document
  examples:
    workplace:
    - The product roadmap shows that we plan to launch the mobile app in the third
      quarter.
    - We need to align our team's goals with the company's product roadmap.
    casual:
    - My personal roadmap includes learning a new language and traveling more next
      year.
    - The government published a roadmap for transitioning to renewable energy.
  related:
  - word: Backlog
    difference: A 'roadmap' is a high-level strategic plan. The 'backlog' is a detailed
      list of tasks and features that need to be done to execute that plan.
  - word: Project plan
    difference: A 'project plan' is typically more detailed and tactical, with specific
      timelines and resource assignments. A 'roadmap' is more strategic and less detailed,
      focusing on goals and outcomes.
  story: 'During the company-wide all-hands meeting, our CEO presented the product
    roadmap for the next year. It outlined the major themes and initiatives we would
    be focusing on, such as international expansion and improving the user experience.
    The roadmap gave everyone a clear sense of direction and helped us understand
    how our individual work contributes to the company''s larger goals.

    '
- word: Rollback
  pronunciation: /ˈroʊl.bæk/
  part_of_speech: noun
  meaning:
    english: The action of restoring a system to a previous state, usually after a
      failed deployment or a critical issue.
    bahasa: Tindakan mengembalikan sistem ke keadaan sebelumnya, biasanya setelah
      penerapan yang gagal atau masalah kritis.
  usage: Use 'rollback' when you need to undo a recent change and go back to a previous
    version.
  synonyms:
  - revert
  - undo
  examples:
    workplace:
    - The deployment failed, so we had to perform a rollback to the previous version.
    - A rollback is our last resort if the new feature causes too many problems.
    casual:
    - I wish I could do a rollback on that terrible haircut I got yesterday.
    - The government announced a rollback of the new tax policy.
  related:
  - word: Revert
    difference: '''Revert'' is often used in the context of version control (e.g.,
      reverting a commit). ''Rollback'' is more commonly used for deployments and
      databases.'
  - word: Restore
    difference: '''Restore'' is a more general term for bringing something back. ''Rollback''
      specifically means going back to a previous stable state.'
  story: 'We deployed a new feature that we thought was ready for production. However,
    shortly after the release, our error monitoring system started reporting a huge
    spike in crashes. We couldn''t find the root cause immediately, so we made the
    decision to do a rollback. Within minutes, the system was restored to its previous,
    stable version, and the errors disappeared.

    '
- word: Sanity check
  pronunciation: /ˈsæn.ə.ti tʃek/
  part_of_speech: phrase
  meaning:
    english: A quick, basic test to see if a claim, a piece of code, or the result
      of a calculation can possibly be true. It helps catch obvious errors.
    bahasa: Tes dasar dan cepat untuk melihat apakah sebuah klaim, sepotong kode,
      atau hasil perhitungan mungkin benar. Ini membantu menangkap kesalahan yang
      jelas.
  usage: Use 'sanity check' for a quick verification you do to make sure your work
    is reasonable and not completely wrong before you proceed with more thorough testing.
  synonyms:
  - reality check
  - quick verification
  examples:
    workplace:
    - Before I push this code, I'm just going to do a quick sanity check to make sure
      the app still runs.
    - Can you do a sanity check on these numbers for me? They seem too high.
    casual:
    - I did a sanity check of my suitcase to make sure I have my passport and wallet.
    - The recipe says 10 cups of sugar. That can't be right. Let me do a sanity check.
  related:
  - word: Test
    difference: A 'test' (like a unit test) is a formal, often automated, check for
      specific correctness. A 'sanity check' is an informal, often manual, high-level
      check for basic sensibility.
  - word: Smoke test
    difference: A 'smoke test' is a slightly more formal set of basic tests to ensure
      the most crucial functions of a program work. A 'sanity check' can be even smaller
      and more informal, sometimes just looking at the code or data.
  story: 'I had just finished writing a complex piece of logic that calculated shipping
    costs. Before I wrote all the detailed unit tests, I wanted to do a quick ''sanity
    check''. I ran the function with a few simple inputs. ''If the cart is empty,
    is the shipping cost zero? Yes. If the destination is local, is the cost low?
    Yes. If the item is very heavy, is the cost high? Yes.'' Since the results made
    sense at a high level, I was confident enough to proceed with writing the full
    test suite.

    '
- word: Scalability
  pronunciation: /ˌskeɪ.ləˈbɪl.ə.ti/
  part_of_speech: noun
  meaning:
    english: The ability of a system, network, or process to handle a growing amount
      of work, or its potential to be enlarged to accommodate that growth.
    bahasa: Kemampuan suatu sistem, jaringan, atau proses untuk menangani jumlah pekerjaan
      yang terus bertambah, atau potensinya untuk diperbesar untuk mengakomodasi pertumbuhan
      tersebut.
  usage: Use 'scalability' to discuss how well a system can perform as the number
    of users or the amount of data increases.
  synonyms:
  - expandability
  - capacity for growth
  examples:
    workplace:
    - We need to design the new service with scalability in mind.
    - The recent outage was caused by a scalability issue in our database.
    casual:
    - The scalability of his small business is limited by the size of his kitchen.
    - The city's public transport system has poor scalability during peak hours.
  related:
  - word: Performance
    difference: '''Performance'' is about how fast a system is right now. ''Scalability''
      is about how well its performance can be maintained as the load increases.'
  - word: Elasticity
    difference: '''Elasticity'' is the ability of a system to automatically add or
      remove resources as needed. It''s a common technique for achieving scalability.'
  story: 'When we first launched our app, it worked perfectly with a few hundred users.
    But as we grew to millions of users, we started facing major performance problems.
    The original design did not consider scalability. We had to spend an entire quarter
    re-architecting our system to handle the increased load. It was a painful lesson
    in the importance of planning for scalability from the beginning.

    '
- word: Scope
  pronunciation: /skoʊp/
  part_of_speech: noun
  meaning:
    english: The extent of the area or subject matter that something deals with or
      to which it is relevant.
    bahasa: Cakupan area atau pokok bahasan yang ditangani oleh sesuatu atau yang
      relevan dengannya.
  usage: Use 'scope' to define the boundaries of a project or task.
  synonyms:
  - range
  - extent
  examples:
    workplace:
    - We need to define the scope of the project before we start working on it.
    - That feature is out of scope for this release.
    casual:
    - The scope of the book is limited to the history of the 20th century.
    - I need to broaden the scope of my job search.
  related:
  - word: Scope creep
    difference: '''Scope creep'' is the tendency for the project scope to expand over
      time. ''Scope'' is the original definition of the project''s boundaries.'
  - word: Requirements
    difference: '''Requirements'' are the specific things that a project must do.
      The ''scope'' is the overall boundary that contains all those requirements.'
  story: 'During the planning phase of our project, the product manager wanted to
    add a lot of new features. Our tech lead had to remind everyone of the initial
    scope. "A live chat feature is a great idea," he said, "but it''s not in the scope
    for this quarter. We need to focus on delivering the core features that we already
    agreed upon."

    '
- word: Scope creep
  pronunciation: /skoʊp kriːp/
  part_of_speech: phrase
  meaning:
    english: When the requirements or goals of a project expand and change from what
      was originally defined at the start.
    bahasa: Ketika persyaratan atau tujuan sebuah proyek meluas dan berubah dari apa
      yang semula ditetapkan di awal.
  usage: Use 'scope creep' to describe the common project management problem where
    a project gets bigger and bigger over time, often leading to delays.
  synonyms:
  - requirement creep
  - feature expansion
  examples:
    workplace:
    - The client keeps asking for 'small' changes. We need to be careful about scope
      creep.
    - This project is a month late, mainly due to constant scope creep.
    casual:
    - I just wanted to clean the kitchen, but scope creep happened, and now I'm reorganizing
      the whole house.
    - The plan was a simple weekend trip, but scope creep turned it into a two-week
      international vacation.
  related:
  - word: Feature creep
    difference: '''Feature creep'' is a specific type of ''scope creep'' where the
      expansion is due to adding more and more new features.'
  - word: Gold plating
    difference: '''Gold plating'' is when a developer adds unnecessary features that
      weren''t requested, thinking it will add value. ''Scope creep'' usually comes
      from external requests from clients or stakeholders.'
  story: 'Our project was supposed to be a simple website with three pages. We had
    a clear plan and a deadline. But then, the marketing team asked for a blog section.
    Then, the sales team wanted a contact form with complex logic. Then, the CEO suggested
    adding an e-commerce store. This is a classic case of ''scope creep''. What started
    as a small, manageable project was slowly turning into a monster that was impossible
    to deliver on time.

    '
- word: Stand-up
  pronunciation: /ˈstænd.ʌp/
  part_of_speech: noun
  meaning:
    english: A short, daily team meeting where everyone briefly reports on their progress.
      The name comes from the practice of having everyone stand up to keep the meeting
      short.
    bahasa: Rapat tim harian yang singkat di mana setiap orang secara singkat melaporkan
      kemajuan mereka. Nama ini berasal dari praktik di mana semua orang berdiri untuk
      menjaga agar rapat tetap singkat.
  usage: Use 'stand-up' to refer to the daily agile meeting.
  synonyms:
  - daily scrum
  - daily huddle
  examples:
    workplace:
    - I'll give you an update during our stand-up tomorrow morning.
    - Our stand-up usually lasts for about 15 minutes.
    casual:
    - We had a quick stand-up in the kitchen to decide who was cooking dinner.
    - The coach gave a quick stand-up talk before the game.
  related:
  - word: Meeting
    difference: A 'meeting' is a general term for any kind of gathering. A 'stand-up'
      is a specific type of short, daily meeting with a clear structure.
  - word: Scrum
    difference: '''Scrum'' is a framework for agile development. The ''daily scrum''
      or ''stand-up'' is just one of the ceremonies within that framework.'
  story: 'Every morning at 9:30 AM, our team has its daily stand-up. Each person answers
    three questions: What did you do yesterday? What will you do today? Are there
    any blockers? Today, during our stand-up, I mentioned that I was blocked on a
    task because I needed an API key from another team. Our team lead immediately
    offered to help me get it after the meeting.

    '
- word: Sync up
  pronunciation: /sɪŋk ʌp/
  part_of_speech: phrase
  meaning:
    english: To meet with someone to coordinate, share information, and ensure everyone
      is on the same page.
    bahasa: Bertemu dengan seseorang untuk berkoordinasi, berbagi informasi, dan memastikan
      semua orang memiliki pemahaman yang sama.
  usage: Use 'sync up' for a short, informal meeting. It's less formal than 'schedule
    a meeting' and implies a quick alignment.
  synonyms:
  - coordinate
  - align
  examples:
    workplace:
    - Let's sync up for 15 minutes tomorrow morning to discuss the plan.
    - The frontend and backend teams need to sync up about the API contract.
    casual:
    - Let's sync up later to decide where to go for dinner.
    - We should sync up before the trip to make sure we all pack the right things.
  related:
  - word: Meet
    difference: '''Meet'' is a very general term. ''Sync up'' specifically implies
      that the purpose of the meeting is to align and share updates, often on an ongoing
      project.'
  - word: Catch up
    difference: '''Catch up'' is often more social and personal. ''Sync up'' is more
      task or project-oriented.'
  story: 'Our team is working remotely from different time zones. To make sure we''re
    all working together effectively, we have a quick ''sync up'' every morning. It''s
    not a long, formal meeting. We just spend 10-15 minutes sharing what we worked
    on yesterday and what our plans are for today. This daily sync up helps us stay
    connected and solve problems quickly.

    '
- word: Technical debt
  pronunciation: /ˈtek.nɪ.kəl det/
  part_of_speech: phrase
  meaning:
    english: The implied cost of rework caused by choosing an easy, limited solution
      now instead of using a better approach that would take longer.
    bahasa: Biaya pengerjaan ulang yang tersirat yang disebabkan oleh pemilihan solusi
      yang mudah dan terbatas sekarang, alih-alih menggunakan pendekatan yang lebih
      baik yang akan memakan waktu lebih lama.
  usage: Use 'technical debt' to describe the long-term consequences of making short-term
    compromises in code quality or design.
  synonyms:
  - design debt
  - code debt
  examples:
    workplace:
    - We accumulated a lot of technical debt to meet the deadline, and now we have
      to pay it back by refactoring the code.
    - That part of the code is full of technical debt and is very difficult to maintain.
    casual:
    - Putting off cleaning my apartment is creating a lot of 'chore debt'.
    - He took out a loan, which is a form of financial debt, similar to how a team
      takes on technical debt.
  related:
  - word: Refactoring
    difference: '''Refactoring'' is the process of improving code without changing
      its functionality. It is one of the main ways to ''pay back'' technical debt.'
  - word: Workaround
    difference: A 'workaround' can sometimes be a source of 'technical debt'. It's
      a quick fix that solves a problem now but might create a bigger mess in the
      long run.
  story: 'After three sprints, the team had enough data to calculate their average
    velocity. They consistently completed around 25 story points. This metric helped
    the product owner make more reliable forecasts for upcoming releases.

    '
- word: Throughput
  pronunciation: /ˈθruː.pʊt/
  part_of_speech: noun
  meaning:
    english: The amount of work, data, or items that can be processed or completed
      in a given period of time.
    bahasa: Jumlah pekerjaan, data, atau item yang dapat diproses atau diselesaikan
      dalam periode waktu tertentu.
  usage: Use 'throughput' to measure the productivity or performance of a system or
    team.
  synonyms:
  - output
  - capacity
  examples:
    workplace:
    - We improved the throughput of our data processing pipeline by 50%.
    - Our team's throughput is low this sprint because of unexpected bugs.
    casual:
    - The factory has a high throughput of a thousand cars per day.
    - The throughput of this coffee machine is too slow for the morning rush.
  related:
  - word: Velocity
    difference: '''Velocity'' is an agile metric for the amount of work a team completes
      in a sprint. ''Throughput'' is a more general term for the rate of completion
      and can be applied to systems as well as teams.'
  - word: Latency
    difference: '''Latency'' is about the delay or time it takes to start. ''Throughput''
      is about the rate or how much can be done over time. A system can have low latency
      but also low throughput.'
  story: 'Our API was struggling to handle the increasing number of user requests.
    The response time was slow, and the overall throughput was poor. We spent a week
    optimizing the database queries and adding more caching. After the changes, we
    measured the system again and saw that the throughput had doubled. The API could
    now handle twice as many requests per second.

    '
- word: Toil
  pronunciation: /tɔɪl/
  part_of_speech: noun
  meaning:
    english: Repetitive, manual, and automatable work that is tactical in nature and
      devoid of long-term value.
    bahasa: Pekerjaan yang berulang, manual, dan dapat diotomatisasi yang bersifat
      taktis dan tidak memiliki nilai jangka panjang.
  usage: Use 'toil' to describe tedious, manual tasks that could and should be automated.
  synonyms:
  - drudgery
  - manual labor
  examples:
    workplace:
    - Manually resetting the test database every morning is a form of toil.
    - Our team has a goal to reduce toil by 20% this quarter by automating our deployment
      process.
    casual:
    - The daily toil of commuting in heavy traffic is exhausting.
    - He was tired of the toil of his factory job.
  related:
  - word: Manual work
    difference: Not all 'manual work' is 'toil'. For example, manually designing a
      new feature is creative work. 'Toil' is specifically the kind of manual work
      that is repetitive and not creative.
  - word: Automation
    difference: '''Automation'' is the solution to ''toil''. You automate tasks to
      eliminate toil.'
  story: 'Our team used to spend hours each week manually generating and emailing
    reports to stakeholders. This was pure toil. It was boring, error-prone, and took
    time away from development. Finally, we dedicated a few days to building a script
    that automated the entire process. Now, the reports are generated and sent automatically,
    freeing us up to focus on more meaningful work.

    '
- word: Tweak
  pronunciation: /twiːk/
  part_of_speech: verb
  meaning:
    english: To make a small adjustment or fine-tune something to improve it.
    bahasa: Membuat penyesuaian kecil atau menyempurnakan sesuatu untuk memperbaikinya.
  usage: Use 'tweak' when you are making minor changes to something, like a piece
    of code, a design, or a configuration setting.
  synonyms:
  - adjust
  - fine-tune
  examples:
    workplace:
    - The button color doesn't look right, I'll just tweak the CSS a bit.
    - I think we can improve performance if we tweak this algorithm.
    casual:
    - I need to tweak my recipe a little, it was too salty last time.
    - He tweaked his profile picture to make it look better.
  related:
  - word: Change
    difference: '''Change'' is a very general term. ''Tweak'' specifically implies
      a small, minor adjustment.'
  - word: Refactor
    difference: '''Refactoring'' is a large-scale restructuring of code to improve
      its internal design. A ''tweak'' is a small change, often to the external behavior
      or appearance (e.g., changing a color or a value).'
  story: 'During user testing, we noticed that a button was not getting enough clicks.
    The feature worked perfectly, but the button''s design didn''t draw attention.
    Our UI designer suggested a small tweak. She changed the button''s color from
    grey to bright blue and made the text bold. It was a tiny change that took only
    five minutes, but this simple tweak increased user engagement with the feature
    by 30%.

    '
- word: Walkthrough
  pronunciation: /ˈwɔːk.θruː/
  part_of_speech: noun
  meaning:
    english: A guided tour or demonstration of a product, feature, or piece of code,
      explaining it step-by-step.
    bahasa: Tur atau demonstrasi terpandu dari suatu produk, fitur, atau bagian kode,
      yang menjelaskannya langkah demi langkah.
  usage: Use 'walkthrough' for a session where someone shows you how something works.
  synonyms:
  - demonstration
  - run-through
  examples:
    workplace:
    - Can you give me a quick walkthrough of your new feature before the demo?
    - We're doing a code walkthrough for the new junior developers.
    casual:
    - I watched a YouTube walkthrough to figure out how to beat that difficult level
      in the game.
    - The setup process was confusing, I needed a walkthrough.
  related:
  - word: Tutorial
    difference: A 'tutorial' is generally for teaching someone how to do something
      themselves. A 'walkthrough' is more like a demonstration where someone shows
      you how it's done.
  - word: Code Review
    difference: A 'code review' is for analyzing and critiquing code to find issues.
      A 'code walkthrough' is typically for explaining the code to others so they
      understand how it works.
  story: 'Our team just finished a major new feature. Before we presented it to the
    stakeholders, our product manager asked for a walkthrough. Our tech lead, Sarah,
    shared her screen and guided us through the entire user journey, from signing
    up to using the new feature. This walkthrough helped us all get on the same page
    and catch a few small issues before the big presentation.

    '
- word: Workaround
  pronunciation: /ˈwɜːrk.əˌraʊnd/
  part_of_speech: noun
  meaning:
    english: A temporary and often imperfect solution to a problem. It's a way to
      get past a bug or issue so you can continue working.
    bahasa: Solusi sementara dan seringkali tidak sempurna untuk suatu masalah. Ini
      adalah cara untuk melewati bug atau masalah agar Anda dapat terus bekerja.
  usage: Use 'workaround' when you've found a way to bypass a problem, but it's not
    the final, proper fix.
  synonyms:
  - temporary fix
  - bypass solution
  examples:
    workplace:
    - The library has a bug, but I found a workaround that lets us move forward for
      now.
    - This is just a temporary workaround. We need to create a ticket for a permanent
      fix.
    casual:
    - The handle on my mug is broken, so as a workaround, I just hold it with two
      hands.
    - My Wi-Fi is down, so I'm using my phone's hotspot as a workaround.
  related:
  - word: Solution
    difference: A 'solution' or 'fix' is the proper, permanent way to solve a problem.
      A 'workaround' is a temporary patch that avoids the problem instead of solving
      it at its root.
  - word: Hack
    difference: A 'hack' can be a clever solution, but it often implies a quick-and-dirty
      or inelegant solution. 'Workaround' is a more professional and neutral term
      for a temporary fix.
  story: 'We discovered a bug in the third-party charting library we were using. When
    we fed it negative numbers, the chart would crash. We reported the bug to the
    library''s developers, but they said a fix wouldn''t be available for weeks. We
    couldn''t wait that long. So, our team came up with a ''workaround''. Before passing
    data to the chart, we checked for negative numbers and replaced them with zero.
    It wasn''t perfect, but it prevented the app from crashing and allowed us to release
    our feature on time.

    '
- word: dependency
  pronunciation: /dɪˈpɛndənsi/
  part_of_speech: noun
  meaning:
    english: A piece of software, library, or module that another piece of software
      requires to function correctly.
    bahasa: Bagian dari perangkat lunak, pustaka, atau modul yang dibutuhkan oleh
      perangkat lunak lain agar dapat berfungsi dengan benar.
  usage: Used to describe the relationships between different code components. Managing
    dependencies is a key part of software development.
  synonyms:
  - prerequisite
  - requirement
  examples:
    workplace:
    - We need to update this dependency because it has a security vulnerability.
    - The project won't build because of a missing dependency.
    casual:
    - His financial dependency on his parents ended when he got a job.
    - The country has a high dependency on imported oil.
  related:
  - word: library
    difference: A library is a collection of reusable code. A dependency is the *need*
      for that library. You declare a dependency on a library.
  - word: package
    difference: A package is a bundle of code and its dependencies, often managed
      by a package manager (like npm or pip). The dependency is the link that says
      your project requires that package.
  story: 'The build failed because of a conflict. One part of the application required
    an old version of a library, while another part needed a newer version. The developer
    had to carefully resolve the dependency conflict to get the project working again.

    '
- word: deploy
  pronunciation: /dɪˈplɔɪ/
  part_of_speech: verb
  meaning:
    english: To release a new version of a software application or feature to a live
      environment, making it available to users.
    bahasa: Merilis versi baru dari aplikasi perangkat lunak atau fitur ke lingkungan
      live, sehingga tersedia bagi pengguna.
  usage: This term is used when making code changes live. It can refer to deploying
    to staging for testing or to production for users.
  synonyms:
  - release
  - launch
  examples:
    workplace:
    - We will deploy the new feature to production on Friday afternoon.
    - The team is waiting for the final approval before they can deploy the changes.
    casual:
    - The general decided to deploy troops to the border.
    - She deployed her resources carefully to win the game.
  related:
  - word: release
    difference: '''Deploy'' often refers to the technical action of moving code, while
      ''release'' can also include the marketing and communication activities around
      making a new feature public.'
  - word: commit
    difference: A 'commit' is saving a small change to the codebase in version control.
      A 'deploy' is the much larger action of putting many commits into a live environment.
  story: 'After weeks of development and testing, it was finally time to deploy the
    new payment gateway. The team gathered in the war room, monitoring the process
    closely. Once the deploy was complete, they watched the logs to ensure everything
    was running smoothly for the users.

    '
- word: epic
  pronunciation: /ˈɛpɪk/
  part_of_speech: noun
  meaning:
    english: A large body of work or a major feature that is too big to be completed
      in a single sprint. It is broken down into smaller user stories.
    bahasa: Sekumpulan pekerjaan besar atau fitur utama yang terlalu besar untuk diselesaikan
      dalam satu sprint. Ini dipecah menjadi user story yang lebih kecil.
  usage: Used in Agile planning to group related user stories under a single, high-level
    objective.
  synonyms:
  - initiative
  - large feature
  examples:
    workplace:
    - The 'Q3 User Profile Redesign' epic includes stories for UI, API, and database
      changes.
    - How many user stories are left in the payments epic?
    casual:
    - His journey to climb Mount Everest was an epic adventure.
    - That movie was an epic, spanning three generations.
  related:
  - word: user story
    difference: An epic is a high-level feature, while a user story is a small, concrete
      requirement that contributes to the epic.
  - word: theme
    difference: A theme is an even higher-level strategic goal that can group multiple
      epics together (e.g., 'Improve User Engagement').
  story: 'The team''s main focus for the quarter was the ''New Reporting Dashboard''
    epic. It was a massive undertaking that involved creating a new data pipeline
    and a completely redesigned user interface. They broke the epic down into dozens
    of user stories to make the work manageable.

    '
- word: mockup
  pronunciation: /ˈmɒkʌp/
  part_of_speech: noun
  meaning:
    english: A static, high-fidelity visual design draft of a product or feature.
      It shows how the final product will look but is not interactive.
    bahasa: Draf desain visual statis dengan ketelitian tinggi dari suatu produk atau
      fitur. Ini menunjukkan bagaimana produk akhir akan terlihat tetapi tidak interaktif.
  usage: Used in the design phase to visualize the user interface and get feedback
    before any code is written.
  synonyms:
  - wireframe
  - prototype
  examples:
    workplace:
    - The designer sent over a mockup of the new homepage for us to review.
    - Let's get the mockup approved by the product manager before we start development.
    casual:
    - He built a cardboard mockup of his invention.
    - The film studio created a mockup of the spaceship for the scene.
  related:
  - word: wireframe
    difference: A wireframe is a low-fidelity, basic layout focusing on structure,
      while a mockup is a high-fidelity visual design that includes colors, fonts,
      and images.
  - word: prototype
    difference: A mockup is a static image, while a prototype is an interactive, clickable
      model that simulates user experience, even if it's not fully functional.
  story: 'The UX designer presented the mockup for the new user profile page. It looked
    clean and modern, with a much better layout than the current version. The team
    provided feedback on a few icon placements, and once the mockup was finalized,
    the front-end developers could start building the interface.

    '
- word: production
  pronunciation: /prəˈdʌkʃən/
  part_of_speech: noun
  meaning:
    english: The live environment where a software application or website is accessed
      by its end users.
    bahasa: Lingkungan live di mana aplikasi perangkat lunak atau situs web diakses
      oleh pengguna akhirnya.
  usage: Often shortened to 'prod.' It's the real, customer-facing system. Errors
    in production are critical.
  synonyms:
  - live environment
  - live server
  examples:
    workplace:
    - Never push code directly to production without testing it first.
    - We're seeing a major issue in production; we may need to roll back.
    casual:
    - The factory ramped up production of the new car.
    - The theater's new production of Hamlet was a huge success.
  related:
  - word: staging
    difference: Staging is the final testing environment for internal teams, while
      production is the live environment that real users interact with.
  - word: live
    difference: '''Live'' is often used as an adjective (the ''live'' system), while
      ''production'' is used as a noun (the ''production'' environment). They essentially
      mean the same thing.'
  story: 'After a successful round of testing on staging, the team got the green light
    to deploy to production. The release was scheduled for late at night to minimize
    disruption. Everyone held their breath until the new version was live and confirmed
    to be stable.

    '
- word: query
  pronunciation: /ˈkwɪəri/
  part_of_speech: noun
  meaning:
    english: A precise request to a database or search engine to retrieve specific
      information.
    bahasa: Permintaan yang tepat ke database atau mesin pencari untuk mengambil informasi
      spesifik.
  usage: Commonly used when talking about fetching data, especially from a database
    using a language like SQL.
  synonyms:
  - request
  - inquiry
  examples:
    workplace:
    - The page is loading slowly because this database query is not optimized.
    - I need to write a query to get all users who signed up last month.
    casual:
    - I had a query about my phone bill, so I called customer service.
    - She raised a query during the lecture.
  related:
  - word: request
    difference: A query is a specific type of request, usually for data from a database.
      A request is a more general term, like an HTTP request to a web server.
  - word: SQL
    difference: SQL (Structured Query Language) is the language used to write the
      query. The query is the command itself.
  story: 'A user reported that their dashboard was not showing the latest data. The
    engineer investigated and found that a complex database query was timing out.
    She rewrote the query to be more efficient, and the data appeared correctly.

    '
- word: sprint
  pronunciation: /sprɪnt/
  part_of_speech: noun
  meaning:
    english: A short, time-boxed period during which a software development team works
      to complete a set amount of work.
    bahasa: Periode singkat dengan batas waktu di mana tim pengembang perangkat lunak
      bekerja untuk menyelesaikan sejumlah pekerjaan yang telah ditentukan.
  usage: Used in Agile and Scrum methodologies to refer to a development cycle, typically
    one to four weeks long.
  synonyms:
  - iteration
  - cycle
  examples:
    workplace:
    - We have a lot of user stories to complete in this sprint.
    - Let's plan the tasks for the next sprint during our meeting tomorrow.
    casual:
    - It felt like a two-week sprint to get the house ready for the party.
    - She finished her final project in a last-minute sprint.
  related:
  - word: marathon
    difference: A sprint is short and intense, while a marathon is a long, endurance-based
      effort. In project management, a 'marathon' might refer to a long-term project.
  - word: scrum
    difference: Scrum is the overall framework or methodology, while a sprint is a
      specific event within that framework.
  story: 'At the beginning of the two-week sprint, the team gathered for the planning
    meeting. They reviewed the backlog and committed to delivering three major features.
    Everyone knew it would be an intense period, but they were focused on the goal.

    '
- word: staging
  pronunciation: /ˈsteɪdʒɪŋ/
  part_of_speech: noun
  meaning:
    english: An environment that is a near-exact replica of the production environment,
      used for final testing before a new feature or version is deployed to live users.
    bahasa: Lingkungan yang merupakan replika yang hampir persis sama dengan lingkungan
      produksi, digunakan untuk pengujian akhir sebelum fitur atau versi baru diterapkan
      untuk pengguna live.
  usage: Refers to the 'staging environment' or 'staging server.' It's the last stop
    for code before it goes live.
  synonyms:
  - pre-production
  - UAT (User Acceptance Testing) environment
  examples:
    workplace:
    - Let's deploy the changes to staging first so the QA team can test them.
    - I found a bug on staging that didn't appear in the local development environment.
    casual:
    - The band was staging their equipment before the concert.
    - The house was for sale, and the realtor recommended staging it to make it look
      more appealing.
  related:
  - word: production
    difference: Staging is the final testing environment for internal teams, while
      production is the live environment that real users interact with.
  - word: development
    difference: The development environment is a developer's local machine or a shared
      server for active coding. Staging is for testing nearly-finished code.
  story: 'The new feature worked perfectly on the developer''s machine, but they still
    needed to deploy it to the staging environment. This allowed the QA engineer to
    perform thorough tests with a realistic dataset, ensuring there were no surprises
    before the final push to production.

    '
- word: user story
  pronunciation: /ˈjuːzər ˈstɔːri/
  part_of_speech: phrase
  meaning:
    english: A simple, informal description of a software feature from the perspective
      of an end user or customer.
    bahasa: Deskripsi sederhana dan informal dari sebuah fitur perangkat lunak dari
      sudut pandang pengguna akhir atau pelanggan.
  usage: 'Used in Agile development to define a small, valuable piece of functionality.
    The typical format is: ''As a [type of user], I want [an action] so that [a benefit].'''
  synonyms:
  - requirement
  - feature request
  examples:
    workplace:
    - I've broken down the epic into several smaller user stories.
    - This user story doesn't have clear acceptance criteria yet.
    casual:
    - 'From a customer''s perspective, the user story is simple: they just want to
      log in easily.'
    - 'Think of your goal as a user story: ''As a student, I want to pass the exam
      so I can graduate.'''
  related:
  - word: epic
    difference: An epic is a large body of work that can be broken down into multiple
      smaller user stories.
  - word: task
    difference: A user story describes a user need ('I want to reset my password'),
      while a task is a specific work item a developer needs to do to complete that
      story (e.g., 'build the reset password API').
  story: 'During sprint planning, the product owner presented a new user story: ''As
    a registered user, I want to save my favorite articles so that I can read them
    later.'' The team discussed the requirements and estimated it would take three
    days to complete.

    '
- word: velocity
  pronunciation: /vəˈlɒsəti/
  part_of_speech: noun
  meaning:
    english: In Agile, a measure of the amount of work a team can complete during
      a single sprint, often measured in story points or hours.
    bahasa: Dalam Agile, ukuran jumlah pekerjaan yang dapat diselesaikan tim selama
      satu sprint, sering diukur dalam story point atau jam.
  usage: Used for planning and forecasting. By knowing their average velocity, a team
    can predict how much work they can realistically commit to in future sprints.
  synonyms:
  - capacity
  - throughput
  examples:
    workplace:
    - Our team's average velocity is about 30 story points per sprint.
    - We shouldn't take on more work; it exceeds our typical velocity.
    casual:
    - The car was traveling at a high velocity.
    - He moved with surprising velocity for someone his size.
  related:
  - word: productivity
    difference: Velocity is a specific Agile metric for a team's output over a sprint.
      Productivity is a more general term for efficiency and can be measured in many
      different ways.
  - word: speed
    difference: In physics, speed is a scalar (distance/time), while velocity is a
      vector (displacement/time). In Agile, velocity specifically refers to the rate
      of completed work.
  story: 'After three sprints, the team had enough data to calculate their average
    velocity. They consistently completed around 25 story points. This metric helped
    the product owner make more reliable forecasts for upcoming releases.

    '

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vocabulary Learning App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: 800;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .search-box:focus {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .btn.load-vocab {
            background: linear-gradient(135deg, #a8e6cf, #7fcdcd);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px 25px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .word-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .word-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .word-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .word-meaning {
            margin-bottom: 20px;
        }

        .word-meaning h4 {
            color: #667eea;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .word-meaning p {
            color: #34495e;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .word-usage {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: #555;
        }

        .word-examples {
            margin-top: 20px;
        }

        .example-category {
            margin-bottom: 15px;
        }

        .example-category h5 {
            color: #764ba2;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .example-item {
            background: rgba(102, 126, 234, 0.08);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-style: italic;
            border-left: 3px solid #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 900px;
            margin: 50px auto;
            width: 95%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #eee;
        }

        .modal-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
            padding: 5px;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #333;
            background: #f0f0f0;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section h3 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .story-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2c3e50;
        }

        .related-words {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .related-word {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #764ba2;
        }

        .related-word h4 {
            color: #764ba2;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.3rem;
            margin: 50px 0;
            font-weight: 300;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
        }

        .date-selector {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .date-selector h3 {
            color: white;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }

        .date-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .date-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .date-btn:hover, .date-btn.active {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .vocabulary-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 25px;
                margin: 20px auto;
            }
            
            .word-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Advanced Vocabulary Master</h1>
            <p>Learn professional vocabulary with real-world context</p>
        </div>

        <div class="controls">
            <input type="text" class="search-box" placeholder="Search words, meanings, or examples..." id="searchInput">
            <button class="btn load-vocab" onclick="loadLatestVocabulary()">📅 Load Latest</button>
            <button class="btn" onclick="shuffleWords()">🎲 Shuffle</button>
            <button class="btn secondary" onclick="showRandomWord()">🎯 Random Word</button>
        </div>

        <div class="date-selector" id="dateSelector" style="display: none;">
            <h3>Available Vocabulary Dates</h3>
            <div class="date-buttons" id="dateButtons"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">Total Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="displayedWords">0</div>
                <div class="stat-label">Showing</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learnedWords">0</div>
                <div class="stat-label">Learned</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="loadedDates">0</div>
                <div class="stat-label">Vocab Sets</div>
            </div>
        </div>

        <div class="vocabulary-grid" id="vocabularyGrid">
            <!-- Words will be inserted here -->
        </div>

        <div class="loading" id="loading" style="display: none;">
            Loading vocabulary data...
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            No words found matching your search.
        </div>
    </div>

    <!-- Modal for detailed view -->
    <div class="modal" id="wordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allVocabulary = [];
        let currentVocabulary = [];
        let learnedCount = 0;
        let availableDates = new Set();
        let selectedDate = 'all';

        // Base URL for the vocabulary repository
        const VOCAB_BASE_URL = 'https://raw.githubusercontent.com/muhfaris/english-vocabulary/refs/heads/main/vocabularies/';
        
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function generateRecentDates(days = 30) {
            const dates = [];
            const today = new Date();
            for (let i = 0; i < days; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                dates.push(formatDate(date));
            }
            return dates;
        }

        async function loadVocabularyFromDate(date) {
            const filename = `vocabulary - ${date}.yaml`;
            const url = VOCAB_BASE_URL + encodeURIComponent(filename);
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const yamlText = await response.text();
                const vocabularyData = jsyaml.load(yamlText);
                
                if (Array.isArray(vocabularyData)) {
                    return vocabularyData.map(word => ({
                        ...word,
                        date: date,
                        id: `${word.word}-${date}`
                    }));
                }
                return [];
            } catch (error) {
                console.log(`Could not load vocabulary for ${url} ${date}:`, error.message);
                return [];
            }
        }

        async function loadLatestVocabulary() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            allVocabulary = [];
            availableDates.clear();
            
            const recentDates = generateRecentDates(30);
            
            for (const date of recentDates) {
                const vocab = await loadVocabularyFromDate(date);
                if (vocab.length > 0) {
                    allVocabulary.push(...vocab);
                    availableDates.add(date);
                }
            }
            
            loading.style.display = 'none';
            
            if (allVocabulary.length === 0) {
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('noResults').textContent = 'No vocabulary data found. Please check the repository.';
                return;
            }
            
            setupDateSelector();
            currentVocabulary = [...allVocabulary];
            renderVocabulary();
            updateStats();
        }

        function setupDateSelector() {
            const dateSelector = document.getElementById('dateSelector');
            const dateButtons = document.getElementById('dateButtons');
            
            if (availableDates.size === 0) {
                dateSelector.style.display = 'none';
                return;
            }
            
            dateSelector.style.display = 'block';
            
            // Sort dates descending (most recent first)
            const sortedDates = Array.from(availableDates).sort((a, b) => b.localeCompare(a));
            
            dateButtons.innerHTML = `
                <button class="date-btn ${selectedDate === 'all' ? 'active' : ''}" 
                        onclick="filterByDate('all')">All Dates</button>
                ${sortedDates.map(date => `
                    <button class="date-btn ${selectedDate === date ? 'active' : ''}" 
                            onclick="filterByDate('${date}')">${date}</button>
                `).join('')}
            `;
        }

        function filterByDate(date) {
            selectedDate = date;
            
            // Update active button
            document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (date === 'all') {
                currentVocabulary = [...allVocabulary];
            } else {
                currentVocabulary = allVocabulary.filter(word => word.date === date);
            }
            
            // Reset search
            document.getElementById('searchInput').value = '';
            
            renderVocabulary();
            updateStats();
        }

        function renderVocabulary(words = currentVocabulary) {
            const grid = document.getElementById('vocabularyGrid');
            const noResults = document.getElementById('noResults');
            
            if (words.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                noResults.textContent = 'No words found matching your search.';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            
            grid.innerHTML = words.map(wordObj => `
                <div class="word-card" onclick="showWordDetails('${wordObj.id}')">
                    <div class="word-title">
                        ${wordObj.word}
                        ${wordObj.date ? `<span style="font-size: 0.7rem; background: #e9ecef; color: #666; padding: 4px 8px; border-radius: 10px;">${wordObj.date}</span>` : ''}
                    </div>
                    
                    <div class="word-meaning">
                        <h4>English</h4>
                        <p>${wordObj.meaning.english}</p>
                    </div>
                    
                    <div class="word-usage">
                        <strong>Usage:</strong> ${wordObj.usage}
                    </div>
               </div>
            `).join('');
            
            updateStats(words.length);
        }

        function updateStats(displayed = currentVocabulary.length) {
            document.getElementById('totalWords').textContent = allVocabulary.length;
            document.getElementById('displayedWords').textContent = displayed;
            document.getElementById('learnedWords').textContent = learnedCount;
            document.getElementById('loadedDates').textContent = availableDates.size;
        }

        function showWordDetails(wordId) {
            const wordObj = allVocabulary.find(w => w.id === wordId);
            if (!wordObj) return;
            
            const modal = document.getElementById('wordModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = wordObj.word;
            
            body.innerHTML = `
                ${wordObj.date ? `<div style="text-align: center; margin-bottom: 25px;"><span style="background: #667eea; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600;">📅 ${wordObj.date}</span></div>` : ''}
                
                <div class="modal-section">
                    <h3>🎯 Meaning</h3>
                    <div style="margin-bottom: 15px;">
                        <strong>English:</strong><br>
                        <div style="font-size: 1.2rem; margin-top: 8px; line-height: 1.6;">${wordObj.meaning.english}</div>
                    </div>
                    <div>
                        <strong>Bahasa Indonesia:</strong><br>
                        <div style="font-size: 1.1rem; margin-top: 8px; line-height: 1.6; color: #666;">${wordObj.meaning.bahasa}</div>
                    </div>
                </div>
                
                <div class="modal-section">
                    <h3>💡 Usage Guide</h3>
                    <div style="font-size: 1.1rem; line-height: 1.7; color: #555;">${wordObj.usage}</div>
                </div>
                
                ${wordObj.examples ? `
                <div class="modal-section">
                    <h3>📝 Examples</h3>
                    ${wordObj.examples.workplace ? `
                        <div style="margin-bottom: 20px;">
                            <h4 style="color: #764ba2; margin-bottom: 10px;">🏢 Workplace Context</h4>
                            ${wordObj.examples.workplace.map(ex => `<div class="example-item">"${ex}"</div>`).join('')}
                        </div>
                    ` : ''}
                    ${wordObj.examples.casual ? `
                        <div>
                            <h4 style="color: #764ba2; margin-bottom: 10px;">💬 Casual Context</h4>
                            ${wordObj.examples.casual.map(ex => `<div class="example-item">"${ex}"</div>`).join('')}
                        </div>
                    ` : ''}
                </div>
                ` : ''}
                
                ${wordObj.related && wordObj.related.length > 0 ? `
                <div class="modal-section">
                    <h3>🔗 Related Words</h3>
                    <div class="related-words">
                        ${wordObj.related.map(rel => `
                            <div class="related-word">
                                <h4>${rel.word}</h4>
                                <p>${rel.difference}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                ${wordObj.story ? `
                <div class="modal-section">
                    <h3>📖 Context Story</h3>
                    <div class="story-section">
                        ${wordObj.story.split('\n').map(paragraph => `<p style="margin-bottom: 15px;">${paragraph}</p>`).join('')}
                    </div>
                </div>
                ` : ''}
                
                <div style="text-align: center; margin-top: 40px;">
                    <button class="btn" onclick="markAsLearned('${wordObj.id}')">✅ Mark as Learned</button>
                    <button class="btn secondary" onclick="closeModal()" style="margin-left: 15px;">📚 Continue Learning</button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        function markAsLearned(wordId) {
            learnedCount++;
            updateStats();
            closeModal();
            
            const wordObj = allVocabulary.find(w => w.id === wordId);
            if (wordObj) {
                setTimeout(() => {
                    alert(`Excellent! You've learned "${wordObj.word}" 🎉`);
                }, 200);
            }
        }

        function closeModal() {
            document.getElementById('wordModal').style.display = 'none';
        }

        function shuffleWords() {
            currentVocabulary = [...currentVocabulary].sort(() => Math.random() - 0.5);
            renderVocabulary();
        }

        function showRandomWord() {
            if (currentVocabulary.length === 0) {
                alert('Please load vocabulary first!');
                return;
            }
            const randomWord = currentVocabulary[Math.floor(Math.random() * currentVocabulary.length)];
            showWordDetails(randomWord.id);
        }

        function searchWords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderVocabulary();
                return;
            }
            
            const filteredWords = currentVocabulary.filter(wordObj => 
                wordObj.word.toLowerCase().includes(searchTerm) ||
                wordObj.meaning.english.toLowerCase().includes(searchTerm) ||
                wordObj.meaning.bahasa.toLowerCase().includes(searchTerm) ||
                wordObj.usage.toLowerCase().includes(searchTerm) ||
                (wordObj.examples && (
                    (wordObj.examples.workplace && wordObj.examples.workplace.some(ex => ex.toLowerCase().includes(searchTerm))) ||
                    (wordObj.examples.casual && wordObj.examples.casual.some(ex => ex.toLowerCase().includes(searchTerm)))
                )) ||
                (wordObj.related && wordObj.related.some(rel => rel.word.toLowerCase().includes(searchTerm))) ||
                (wordObj.story && wordObj.story.toLowerCase().includes(searchTerm))
            );
            
            renderVocabulary(filteredWords);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', searchWords);
        
        // Close modal when clicking outside
        document.getElementById('wordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Auto-load vocabulary on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadLatestVocabulary();
        });
    </script>
</body>
</html>

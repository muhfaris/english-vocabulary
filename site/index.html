<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vocabulary Learning App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: 800;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .search-box:focus {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .date-range-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .date-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .date-icon {
            position: absolute;
            left: 15px;
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
        }
        
        .date-picker {
            padding: 15px 15px 15px 45px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
            cursor: pointer;
            min-width: 160px;
            max-width: 200px;
        }
        
        .date-picker:focus {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }
        
        .date-separator {
            color: white;
            font-weight: 500;
            font-size: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px 25px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .word-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .word-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .word-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .word-meaning {
            margin-bottom: 20px;
        }

        .word-meaning h4 {
            color: #667eea;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .word-meaning p {
            color: #34495e;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .word-usage {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: #555;
        }

        .word-examples {
            margin-top: 20px;
        }

        .example-category {
            margin-bottom: 15px;
        }

        .example-category h5 {
            color: #764ba2;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .example-item {
            background: rgba(102, 126, 234, 0.08);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-style: italic;
            border-left: 3px solid #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 900px;
            margin: 50px auto;
            width: 95%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #eee;
        }

        .modal-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
            padding: 5px;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #333;
            background: #f0f0f0;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section h3 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .story-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2c3e50;
        }

        .related-words {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .related-word {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #764ba2;
        }

        .related-word h4 {
            color: #764ba2;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.3rem;
            margin: 50px 0;
            font-weight: 300;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
        }


        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
            
            .controls {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .date-range-container {
                flex-direction: row;
                gap: 8px;
                width: 100%;
                justify-content: space-between;
            }
            
            .date-input-wrapper {
                flex: 1;
            }
            
            .date-picker {
                width: 100%;
                min-width: auto;
                max-width: none;
                padding: 12px 12px 12px 35px;
                font-size: 14px;
            }
            
            .date-icon {
                left: 10px;
                font-size: 14px;
            }
            
            .date-separator {
                font-size: 14px;
                flex-shrink: 0;
                padding: 0 2px;
            }
            
            .vocabulary-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 25px;
                margin: 20px auto;
            }
            
            .word-title {
                font-size: 1.6rem;
            }
        }
        
        @media (max-width: 480px) {
            .date-range-container {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
            
            .date-separator {
                text-align: center;
                font-size: 12px;
            }
            
            .date-picker {
                padding: 14px 14px 14px 40px;
            }
            
            .date-icon {
                left: 12px;
            }
        }

        /* Flash Card Styles */
        .flash-card-container {
            position: relative;
            max-width: 1000px;
            margin: 30px auto;
            width: 95%;
        }

        .flash-card {
            perspective: 1000px;
            height: 500px;
            cursor: pointer;
        }

        .flash-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flash-card.flipped .flash-card-inner {
            transform: rotateY(180deg);
        }

        .flash-card-front, .flash-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .flash-card-front {
            justify-content: center;
        }
        
        .flash-card-back {
            justify-content: flex-start;
            overflow-y: auto;
        }

        .flash-card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .flash-card-back {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .flash-card-header {
            margin-bottom: 40px;
            flex-shrink: 0;
        }
        
        .flash-card-front .flash-card-header {
            margin-bottom: 20px;
        }

        .flash-card-header h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            line-height: 1.2;
        }

        .flash-card-date {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .flash-card-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            opacity: 0.8;
            font-style: italic;
            font-weight: 500;
        }

        .flash-card-content {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
        }

        .flash-meaning {
            margin-bottom: 25px;
        }

        .flash-meaning h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
        }

        .flash-meaning p {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .flash-usage {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            border-left: 4px solid rgba(255,255,255,0.3);
        }

        .flash-example {
            font-size: 1rem;
            font-style: italic;
            opacity: 0.95;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.5;
        }

        .flash-card-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .flash-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .flash-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
        }

        .flash-btn.secondary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .flash-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .flash-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flash-close-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .flash-card-container {
                max-width: 95%;
                margin: 20px auto;
            }

            .flash-card {
                height: 450px;
            }

            .flash-card-front, .flash-card-back {
                padding: 25px;
            }

            .flash-card-header {
                margin-bottom: 30px;
            }

            .flash-card-header h2 {
                font-size: 2.2rem;
            }

            .flash-meaning h3 {
                font-size: 1.2rem;
            }

            .flash-meaning p {
                font-size: 1.1rem;
            }

            .flash-usage {
                font-size: 1rem;
                padding: 18px;
            }

            .flash-example {
                font-size: 0.95rem;
            }

            .flash-card-controls {
                margin-top: 20px;
                gap: 10px;
            }

            .flash-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .flash-card {
                height: 400px;
            }

            .flash-card-front, .flash-card-back {
                padding: 20px;
            }

            .flash-card-header h2 {
                font-size: 1.8rem;
            }

            .flash-meaning h3 {
                font-size: 1.1rem;
            }

            .flash-meaning p {
                font-size: 1rem;
            }

            .flash-usage {
                font-size: 0.95rem;
                padding: 15px;
            }

            .flash-example {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Advanced Vocabulary Master</h1>
            <p>Learn professional vocabulary with real-world context</p>
        </div>

        <div class="controls">
            <input type="text" class="search-box" placeholder="Search words, meanings, or examples..." id="searchInput">
            <div class="date-range-container">
                <div class="date-input-wrapper">
                    <span class="date-icon">📅</span>
                    <input type="date" class="date-picker" id="startDate" onchange="loadVocabularyForDateRange()" placeholder="From">
                </div>
                <span class="date-separator">to</span>
                <div class="date-input-wrapper">
                    <span class="date-icon">📅</span>
                    <input type="date" class="date-picker" id="endDate" onchange="loadVocabularyForDateRange()" placeholder="To">
                </div>
            </div>
            <button class="btn" onclick="shuffleWords()">🎲 Shuffle</button>
            <button class="btn secondary" onclick="showRandomWord()">🎯 Random Word</button>
        </div>


        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">Total Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="displayedWords">0</div>
                <div class="stat-label">Showing</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learnedWords">0</div>
                <div class="stat-label">Learned</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="loadedDates">0</div>
                <div class="stat-label">Vocab Sets</div>
            </div>
        </div>

        <div class="vocabulary-grid" id="vocabularyGrid">
            <!-- Words will be inserted here -->
        </div>

        <div class="loading" id="loading" style="display: none;">
            <span id="loadingText">Loading vocabulary data...</span>
            <div id="cacheIndicator" style="font-size: 0.9rem; opacity: 0.8; margin-top: 5px;"></div>
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            No words found matching your search.
        </div>
    </div>

    <!-- Modal for detailed view -->
    <div class="modal" id="wordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Flash Card Modal -->
    <div class="modal" id="flashCardModal" style="display: none;">
        <div class="flash-card-container">
            <div class="flash-card" id="flashCard">
                <div class="flash-card-inner">
                    <div class="flash-card-front">
                        <div class="flash-card-header">
                            <h2 id="flashCardWord"></h2>
                            <span class="flash-card-date" id="flashCardDate"></span>
                        </div>
                        <div class="flash-card-hint">💡 Tap to reveal meaning</div>
                    </div>
                    <div class="flash-card-back">
                        <div class="flash-card-content">
                            <div class="flash-meaning" id="flashMeaning"></div>
                            <div class="flash-usage" id="flashUsage"></div>
                            <div class="flash-example" id="flashExample"></div>
                        </div>
                        <div class="flash-card-hint">💡 Tap again to see front</div>
                    </div>
                </div>
            </div>
            <div class="flash-card-controls">
                <button class="flash-btn secondary" onclick="closeFlashCard()">📚 Continue</button>
                <button class="flash-btn" onclick="showNextFlashCard()">➡️ Next Word</button>
                <button class="flash-btn primary" onclick="markFlashCardLearned()">✅ Learned</button>
            </div>
            <button class="flash-close-btn" onclick="closeFlashCard()">&times;</button>
        </div>
    </div>

    <script>
        let allVocabulary = [];
        let currentVocabulary = [];
        let learnedCount = 0;
        let loadedDates = new Set();
        
        // Cache configuration
        const CACHE_EXPIRY_HOURS = 24; // Cache expires after 24 hours
        const CACHE_KEY_PREFIX = 'vocab_cache_';
        const CACHE_TIMESTAMP_KEY = 'vocab_cache_timestamp_';

        // Base URL for the vocabulary repository
        const VOCAB_BASE_URL = 'https://raw.githubusercontent.com/muhfaris/english-vocabulary/refs/heads/main/vocabularies/';
        
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function generateRecentDates(days = 30) {
            const dates = [];
            const today = new Date();
            for (let i = 0; i < days; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                dates.push(formatDate(date));
            }
            return dates;
        }

        // Cache management functions
        function getCacheKey(date) {
            return CACHE_KEY_PREFIX + date;
        }
        
        function getTimestampKey(date) {
            return CACHE_TIMESTAMP_KEY + date;
        }
        
        function isCacheExpired(date) {
            const timestampKey = getTimestampKey(date);
            const timestamp = localStorage.getItem(timestampKey);
            
            if (!timestamp) return true;
            
            const cacheTime = new Date(parseInt(timestamp));
            const now = new Date();
            const hoursDiff = (now - cacheTime) / (1000 * 60 * 60);
            
            return hoursDiff > CACHE_EXPIRY_HOURS;
        }
        
        function getCachedVocabulary(date) {
            if (isCacheExpired(date)) {
                // Remove expired cache
                localStorage.removeItem(getCacheKey(date));
                localStorage.removeItem(getTimestampKey(date));
                return null;
            }
            
            const cached = localStorage.getItem(getCacheKey(date));
            return cached ? JSON.parse(cached) : null;
        }
        
        function setCachedVocabulary(date, data) {
            try {
                localStorage.setItem(getCacheKey(date), JSON.stringify(data));
                localStorage.setItem(getTimestampKey(date), Date.now().toString());
            } catch (error) {
                console.warn('Could not cache vocabulary data:', error.message);
                // If localStorage is full, clear old cache entries
                clearOldCache();
            }
        }
        
        function clearOldCache() {
            const keysToRemove = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.startsWith(CACHE_KEY_PREFIX) || key.startsWith(CACHE_TIMESTAMP_KEY))) {
                    const date = key.replace(CACHE_KEY_PREFIX, '').replace(CACHE_TIMESTAMP_KEY, '');
                    if (isCacheExpired(date)) {
                        keysToRemove.push(key);
                    }
                }
            }
            
            keysToRemove.forEach(key => localStorage.removeItem(key));
        }
        
        function getCacheInfo() {
            const cacheEntries = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(CACHE_KEY_PREFIX)) {
                    const date = key.replace(CACHE_KEY_PREFIX, '');
                    const timestamp = localStorage.getItem(getTimestampKey(date));
                    const data = localStorage.getItem(key);
                    
                    if (timestamp && data) {
                        cacheEntries.push({
                            date,
                            timestamp: new Date(parseInt(timestamp)),
                            expired: isCacheExpired(date),
                            size: data.length
                        });
                    }
                }
            }
            
            return cacheEntries;
        }
        
        async function loadVocabularyFromDate(date) {
            // Check cache first
            const cached = getCachedVocabulary(date);
            if (cached) {
                return { data: cached, fromCache: true };
            }
            
            const filename = `vocabulary - ${date}.yaml`;
            const url = VOCAB_BASE_URL + encodeURIComponent(filename);
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const yamlText = await response.text();
                const vocabularyData = jsyaml.load(yamlText);
                
                if (Array.isArray(vocabularyData)) {
                    const processedData = vocabularyData.map(word => ({
                        ...word,
                        date: date,
                        id: `${word.word}-${date}`
                    }));
                    
                    // Cache the processed data
                    setCachedVocabulary(date, processedData);
                    
                    return { data: processedData, fromCache: false };
                }
                return { data: [], fromCache: false };
            } catch (error) {
                console.log(`Could not load vocabulary for ${date}:`, error.message);
                return { data: [], fromCache: false };
            }
        }

        function generateDateRange(startDate, endDate) {
            const dates = [];
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            while (start <= end) {
                dates.push(formatDate(start));
                start.setDate(start.getDate() + 1);
            }
            return dates;
        }
        
        // Debounce function for performance optimization
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        async function loadVocabularyForDateRange() {
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');
            const startDate = startDateInput.value;
            const endDate = endDateInput.value;
            
            // If only start date is selected, treat it as single date
            if (startDate && !endDate) {
                endDateInput.value = startDate;
            }
            
            // If only end date is selected, treat it as single date  
            if (!startDate && endDate) {
                startDateInput.value = endDate;
            }
            
            if (!startDate || !endDate) return;
            
            // Ensure start date is not after end date
            if (new Date(startDate) > new Date(endDate)) {
                const temp = startDate;
                startDateInput.value = endDate;
                endDateInput.value = temp;
                return loadVocabularyForDateRange();
            }
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            allVocabulary = [];
            loadedDates.clear();
            
            const dateRange = generateDateRange(startDateInput.value, endDateInput.value);
            
            // Load vocabulary data in parallel for better performance
            const loadPromises = dateRange.map(async (date) => {
                try {
                    const result = await loadVocabularyFromDate(date);
                    return { date, vocab: result.data, fromCache: result.fromCache };
                } catch (error) {
                    console.log(`Could not load vocabulary for ${date}:`, error.message);
                    return { date, vocab: [], fromCache: false };
                }
            });
            
            // Update loading indicator
            let cachedCount = 0;
            let totalCount = dateRange.length;
            
            const results = await Promise.all(loadPromises);
            
            // Process results and count cache hits
            results.forEach(({ date, vocab, fromCache }) => {
                if (fromCache) cachedCount++;
                if (vocab.length > 0) {
                    allVocabulary.push(...vocab);
                    loadedDates.add(date);
                }
            });
            
            // Show cache status briefly
            if (cachedCount > 0) {
                const cacheIndicator = document.getElementById('cacheIndicator');
                if (cachedCount === totalCount) {
                    cacheIndicator.textContent = `⚡ Loaded from cache (instant)`;
                } else {
                    cacheIndicator.textContent = `⚡ ${cachedCount}/${totalCount} from cache`;
                }
            }
            
            loading.style.display = 'none';
            
            // Clear cache indicator after a short delay
            setTimeout(() => {
                const cacheIndicator = document.getElementById('cacheIndicator');
                if (cacheIndicator) cacheIndicator.textContent = '';
            }, 2000);
            
            if (allVocabulary.length === 0) {
                document.getElementById('noResults').style.display = 'block';
                document.getElementById('noResults').textContent = `No vocabulary data found for the selected date range.`;
                document.getElementById('vocabularyGrid').style.display = 'none';
            } else {
                currentVocabulary = [...allVocabulary];
                document.getElementById('noResults').style.display = 'none';
                renderVocabulary();
            }
            
            updateStats();
        }



        function renderVocabulary(words = currentVocabulary) {
            const grid = document.getElementById('vocabularyGrid');
            const noResults = document.getElementById('noResults');
            
            if (words.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                noResults.textContent = 'No words found matching your search.';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            
            grid.innerHTML = words.map(wordObj => `
                <div class="word-card" onclick="showWordDetails('${wordObj.id}')">
                    <div class="word-title">
                        ${wordObj.word}
                        ${wordObj.date ? `<span style="font-size: 0.7rem; background: #e9ecef; color: #666; padding: 4px 8px; border-radius: 10px;">${wordObj.date}</span>` : ''}
                    </div>
                    
                    <div class="word-meaning">
                        <h4>English</h4>
                        <p>${wordObj.meaning.english}</p>
                    </div>
                    
                    <div class="word-usage">
                        <strong>Usage:</strong> ${wordObj.usage}
                    </div>
               </div>
            `).join('');
            
            updateStats(words.length);
        }

        function updateStats(displayed = currentVocabulary.length) {
            document.getElementById('totalWords').textContent = allVocabulary.length;
            document.getElementById('displayedWords').textContent = displayed;
            document.getElementById('learnedWords').textContent = learnedCount;
            document.getElementById('loadedDates').textContent = loadedDates.size;
        }

        function showWordDetails(wordId) {
            const wordObj = allVocabulary.find(w => w.id === wordId);
            if (!wordObj) return;
            
            const modal = document.getElementById('wordModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = wordObj.word;
            
            body.innerHTML = `
                ${wordObj.date ? `<div style="text-align: center; margin-bottom: 25px;"><span style="background: #667eea; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600;">📅 ${wordObj.date}</span></div>` : ''}
                
                <div class="modal-section">
                    <h3>🎯 Meaning</h3>
                    <div style="margin-bottom: 15px;">
                        <strong>English:</strong><br>
                        <div style="font-size: 1.2rem; margin-top: 8px; line-height: 1.6;">${wordObj.meaning.english}</div>
                    </div>
                    <div>
                        <strong>Bahasa Indonesia:</strong><br>
                        <div style="font-size: 1.1rem; margin-top: 8px; line-height: 1.6; color: #666;">${wordObj.meaning.bahasa}</div>
                    </div>
                </div>
                
                <div class="modal-section">
                    <h3>💡 Usage Guide</h3>
                    <div style="font-size: 1.1rem; line-height: 1.7; color: #555;">${wordObj.usage}</div>
                </div>
                
                ${wordObj.examples ? `
                <div class="modal-section">
                    <h3>📝 Examples</h3>
                    ${wordObj.examples.workplace ? `
                        <div style="margin-bottom: 20px;">
                            <h4 style="color: #764ba2; margin-bottom: 10px;">🏢 Workplace Context</h4>
                            ${wordObj.examples.workplace.map(ex => `<div class="example-item">"${ex}"</div>`).join('')}
                        </div>
                    ` : ''}
                    ${wordObj.examples.casual ? `
                        <div>
                            <h4 style="color: #764ba2; margin-bottom: 10px;">💬 Casual Context</h4>
                            ${wordObj.examples.casual.map(ex => `<div class="example-item">"${ex}"</div>`).join('')}
                        </div>
                    ` : ''}
                </div>
                ` : ''}
                
                ${wordObj.related && wordObj.related.length > 0 ? `
                <div class="modal-section">
                    <h3>🔗 Related Words</h3>
                    <div class="related-words">
                        ${wordObj.related.map(rel => `
                            <div class="related-word">
                                <h4>${rel.word}</h4>
                                <p>${rel.difference}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
                
                ${wordObj.story ? `
                <div class="modal-section">
                    <h3>📖 Context Story</h3>
                    <div class="story-section">
                        ${wordObj.story.split('\n').map(paragraph => `<p style="margin-bottom: 15px;">${paragraph}</p>`).join('')}
                    </div>
                </div>
                ` : ''}
                
                <div style="text-align: center; margin-top: 40px;">
                    <button class="btn" onclick="markAsLearned('${wordObj.id}')">✅ Mark as Learned</button>
                    <button class="btn secondary" onclick="closeModal()" style="margin-left: 15px;">📚 Continue Learning</button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        function markAsLearned(wordId) {
            learnedCount++;
            updateStats();
            closeModal();
        }

        function closeModal() {
            document.getElementById('wordModal').style.display = 'none';
        }

        function shuffleWords() {
            currentVocabulary = [...currentVocabulary].sort(() => Math.random() - 0.5);
            renderVocabulary();
        }

        let currentFlashCard = null;
        
        function showRandomWord() {
            if (currentVocabulary.length === 0) {
                alert('Please load vocabulary first!');
                return;
            }
            showRandomFlashCard();
        }
        
        function showRandomFlashCard() {
            const randomWord = currentVocabulary[Math.floor(Math.random() * currentVocabulary.length)];
            currentFlashCard = randomWord;
            showFlashCard(randomWord);
        }
        
        function showFlashCard(wordObj) {
            const modal = document.getElementById('flashCardModal');
            const flashCard = document.getElementById('flashCard');
            
            // Reset card to front side
            flashCard.classList.remove('flipped');
            
            // Fill front side
            document.getElementById('flashCardWord').textContent = wordObj.word;
            document.getElementById('flashCardDate').textContent = wordObj.date || '';
            
            // Fill back side
            const meaningDiv = document.getElementById('flashMeaning');
            meaningDiv.innerHTML = `
                <h3>English</h3>
                <p>${wordObj.meaning.english}</p>
                <h3>Bahasa Indonesia</h3>
                <p>${wordObj.meaning.bahasa}</p>
            `;
            
            document.getElementById('flashUsage').textContent = wordObj.usage;
            
            // Show a random example if available
            const exampleDiv = document.getElementById('flashExample');
            if (wordObj.examples) {
                let allExamples = [];
                if (wordObj.examples.workplace) allExamples.push(...wordObj.examples.workplace);
                if (wordObj.examples.casual) allExamples.push(...wordObj.examples.casual);
                
                if (allExamples.length > 0) {
                    const randomExample = allExamples[Math.floor(Math.random() * allExamples.length)];
                    exampleDiv.textContent = `"${randomExample}"`;
                } else {
                    exampleDiv.textContent = '';
                }
            } else {
                exampleDiv.textContent = '';
            }
            
            modal.style.display = 'block';
        }
        
        function closeFlashCard() {
            document.getElementById('flashCardModal').style.display = 'none';
            currentFlashCard = null;
        }
        
        function showNextFlashCard() {
            if (currentVocabulary.length === 0) return;
            showRandomFlashCard();
        }
        
        function markFlashCardLearned() {
            if (currentFlashCard) {
                learnedCount++;
                updateStats();
                showNextFlashCard();
            }
        }

        function searchWords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderVocabulary();
                return;
            }
            
            const filteredWords = currentVocabulary.filter(wordObj => 
                wordObj.word.toLowerCase().includes(searchTerm) ||
                wordObj.meaning.english.toLowerCase().includes(searchTerm) ||
                wordObj.meaning.bahasa.toLowerCase().includes(searchTerm) ||
                wordObj.usage.toLowerCase().includes(searchTerm) ||
                (wordObj.examples && (
                    (wordObj.examples.workplace && wordObj.examples.workplace.some(ex => ex.toLowerCase().includes(searchTerm))) ||
                    (wordObj.examples.casual && wordObj.examples.casual.some(ex => ex.toLowerCase().includes(searchTerm)))
                )) ||
                (wordObj.related && wordObj.related.some(rel => rel.word.toLowerCase().includes(searchTerm))) ||
                (wordObj.story && wordObj.story.toLowerCase().includes(searchTerm))
            );
            
            renderVocabulary(filteredWords);
        }

        // Event listeners with debounced search for better performance
        document.getElementById('searchInput').addEventListener('input', debounce(searchWords, 300));
        
        // Close modal when clicking outside
        document.getElementById('wordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeFlashCard();
            }
        });
        
        // Flash card flip on click
        document.addEventListener('DOMContentLoaded', function() {
            const flashCard = document.getElementById('flashCard');
            if (flashCard) {
                flashCard.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });
            }
        });

        
        // Set today's date and auto-load vocabulary on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Clean expired cache on startup
            clearOldCache();
            
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            const today = formatDate(new Date());
            
            // Set both dates to today by default
            startDate.value = today;
            endDate.value = today;
            
            // Prevent selecting future dates
            startDate.max = today;
            endDate.max = today;
            
            // Load vocabulary for today
            loadVocabularyForDateRange();
        });
    </script>
</body>
</html>
